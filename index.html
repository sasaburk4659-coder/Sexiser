<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: white;
            font-family: Arial;
        }
        .blocked {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="content"></div>
    
    <script>
        // Данные от Python скрипта
        const siteData = {"blocked": true, "message": "Сайт временно закрыт", "color": "red"};
        
        // Применяем данные
        if (siteData.blocked) {
            document.getElementById('content').innerHTML = `
                <div class="blocked">
                    <div style="text-align: center;">
                        <h1>⛔</h1>
                        <p>${siteData.message}</p>
                    </div>
                </div>
            `;
        } else {
            document.getElementById('content').innerHTML = '';
            document.body.style.background = 'white';
        }
    </script>
</body>
</html>
