<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Авторизация</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            transition: background 0.2s ease;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--tg-theme-hint-color, #aaa);
            padding-bottom: 8px;
        }

        .tab {
            flex: 1;
            text-align: center;
            font-size: 18px;
            font-weight: 500;
            padding: 8px 0;
            cursor: pointer;
            color: var(--tg-theme-hint-color, #6c6c6c);
            transition: all 0.2s;
        }

        .tab.active {
            color: var(--tg-theme-button-color, #2481cc);
            border-bottom: 2px solid var(--tg-theme-button-color, #2481cc);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--tg-theme-text-color, #000);
        }

        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 12px;
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            color: var(--tg-theme-text-color, #000);
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: var(--tg-theme-button-color, #2481cc);
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 12px;
        }

        button:active {
            opacity: 0.7;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            background: var(--tg-theme-secondary-bg-color, #e9e9ef);
            color: var(--tg-theme-text-color, #000);
            display: none;
        }

        .error {
            background: rgba(255, 80, 80, 0.2);
            color: #ff4d4d;
        }

        .success {
            background: rgba(80, 200, 80, 0.2);
            color: #2e7d32;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="tabs">
        <div class="tab active" data-tab="register">Регистрация</div>
        <div class="tab" data-tab="login">Вход</div>
    </div>

    <div id="register-form" class="form-panel">
        <div class="form-group">
            <label>Имя пользователя</label>
            <input type="text" id="reg-username" placeholder="например, johndoe" autocomplete="off">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="reg-password" placeholder="минимум 4 символа">
        </div>
        <div class="form-group">
            <label>Повторите пароль</label>
            <input type="password" id="reg-password2" placeholder="повторите пароль">
        </div>
        <button id="register-btn">Зарегистрироваться</button>
    </div>

    <div id="login-form" class="form-panel" style="display: none;">
        <div class="form-group">
            <label>Имя пользователя</label>
            <input type="text" id="login-username" placeholder="ваше имя">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="login-password" placeholder="пароль">
        </div>
        <button id="login-btn">Войти</button>
    </div>

    <div id="message" class="message"></div>
</div>

<script>
    const WebApp = window.Telegram.WebApp;
    WebApp.expand();
    WebApp.ready();

    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
        showMessage('Ошибка: отсутствует токен. Запросите ссылку заново в боте.', 'error');
    }

    const tabs = document.querySelectorAll('.tab');
    const registerPanel = document.getElementById('register-form');
    const loginPanel = document.getElementById('login-form');

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const target = tab.dataset.tab;
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');

            if (target === 'register') {
                registerPanel.style.display = 'block';
                loginPanel.style.display = 'none';
            } else {
                registerPanel.style.display = 'none';
                loginPanel.style.display = 'block';
            }
            hideMessage();
        });
    });

    function showMessage(text, type = 'error') {
        const msgDiv = document.getElementById('message');
        msgDiv.textContent = text;
        msgDiv.className = `message ${type}`;
        msgDiv.style.display = 'block';
        setTimeout(() => {
            if (msgDiv.style.display === 'block') msgDiv.style.display = 'none';
        }, 4000);
    }

    function hideMessage() {
        const msgDiv = document.getElementById('message');
        msgDiv.style.display = 'none';
    }

    async function sendToBot(data) {
        if (!token) return;
        data.token = token;
        try {
            WebApp.sendData(JSON.stringify(data));
            showMessage('Данные отправлены. Возвращайтесь в бота...', 'success');
            setTimeout(() => {
                WebApp.close();
            }, 1500);
        } catch (e) {
            showMessage('Ошибка отправки: ' + e.message);
        }
    }

    document.getElementById('register-btn').addEventListener('click', () => {
        const username = document.getElementById('reg-username').value.trim();
        const password = document.getElementById('reg-password').value;
        const password2 = document.getElementById('reg-password2').value;

        if (!username) {
            showMessage('Введите имя пользователя');
            return;
        }
        if (!password) {
            showMessage('Введите пароль');
            return;
        }
        if (password !== password2) {
            showMessage('Пароли не совпадают');
            return;
        }
        if (password.length < 4) {
            showMessage('Пароль должен быть не менее 4 символов');
            return;
        }

        sendToBot({
            action: 'register',
            username: username,
            password: password,
            password2: password2
        });
    });

    document.getElementById('login-btn').addEventListener('click', () => {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value;

        if (!username) {
            showMessage('Введите имя пользователя');
            return;
        }
        if (!password) {
            showMessage('Введите пароль');
            return;
        }

        sendToBot({
            action: 'login',
            username: username,
            password: password
        });
    });
</script>
</body>
</html>
