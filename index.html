<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Кликер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: system-ui; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        #coin { width: 150px; height: 150px; background: gold; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; cursor: pointer; transition: transform 0.1s; box-shadow: 0 4px 8px rgba(0,0,0,0.2); margin-bottom: 20px; }
        #coin:active { transform: scale(0.95); }
        #balance { font-size: 2rem; font-weight: bold; }
    </style>
</head>
<body>
    <div id="coin">🪙</div>
    <div id="balance">0</div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready(); // Сообщаем Telegram, что приложение загружено
        tg.expand(); // Растягиваем приложение на весь экран

        let balanceSpan = document.getElementById('balance');

        async function sendClick() {
            try {
                let response = await fetch('/click', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'click' })
                });
                let newBalance = await response.text();
                balanceSpan.innerText = newBalance;
            } catch (error) {
                console.error('Ошибка отправки:', error);
            }
        }

        document.getElementById('coin').addEventListener('click', sendClick);
    </script>
</body>
</html>
