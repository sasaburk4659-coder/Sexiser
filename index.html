<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NeuralFlow Pro — Полная копия n8n для нейросетей</title>
    <!-- React -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <!-- ReactFlow -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reactflow@11.10.4/dist/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/reactflow@11.10.4/dist/umd/index.js"></script>
    <!-- JSZip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { overflow: hidden; font-family: 'Inter', system-ui, sans-serif; background: #0a0c15; }
        
        .node-container {
            background: linear-gradient(135deg, #1a1f2e 0%, #0f1119 100%);
            border-radius: 20px;
            border: 2px solid #2a2f3f;
            min-width: 280px;
            transition: all 0.2s;
            cursor: grab;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            position: relative;
        }
        .node-container:active { cursor: grabbing; }
        .node-container:hover { border-color: #3b82f6; transform: translateY(-2px); }
        .node-container.selected { border: 2px solid #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.3); }
        
        .drag-cancel {
            position: absolute;
            top: -12px;
            right: -12px;
            width: 28px;
            height: 28px;
            background: #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .drag-cancel:hover { transform: scale(1.1); background: #dc2626; }
        
        .node-header { padding: 14px 16px; border-radius: 20px 20px 0 0; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 12px; background: rgba(15,20,35,0.8); border-bottom: 1px solid #2a2f3f; cursor: grab; }
        .node-content { padding: 14px 16px; font-size: 12px; color: #8b92a8; background: rgba(10,12,21,0.6); border-radius: 0 0 20px 20px; }
        .node-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: #1e2438; border-radius: 24px; font-size: 10px; margin-top: 8px; margin-right: 8px; color: #a5b4fc; }
        
        .react-flow__handle { width: 14px; height: 14px; background: #3b82f6; border: 3px solid #0f1119; border-radius: 50%; cursor: crosshair; }
        .react-flow__handle:hover { transform: scale(1.3); background: #60a5fa; }
        .react-flow__edge-path { stroke: #3b82f6; stroke-width: 3; cursor: pointer; }
        
        .context-menu {
            position: fixed;
            background: #1a1f2e;
            border: 1px solid #2a2f3f;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            z-index: 1000;
            min-width: 200px;
            overflow: hidden;
            animation: fadeIn 0.1s ease;
        }
        .context-menu-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: #e2e8f0; font-size: 14px; }
        .context-menu-item:hover { background: #2a2f3f; }
        .context-menu-item.danger { color: #ef4444; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: #0f1119; border-radius: 28px; border: 1px solid #2a2f3f; max-width: 500px; width: 90%; max-height: 85vh; overflow: auto; padding: 24px; }
        
        .chat-panel {
            position: fixed;
            right: 0;
            top: 0;
            width: 420px;
            height: 100vh;
            background: #0f1119;
            border-left: 1px solid #2a2f3f;
            transform: translateX(100%);
            transition: transform 0.3s;
            z-index: 50;
            display: flex;
            flex-direction: column;
        }
        .chat-panel.open { transform: translateX(0); }
        
        .message-user { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border-radius: 20px 20px 4px 20px; }
        .message-ai { background: #1e2438; color: #e2e8f0; border-radius: 20px 20px 20px 4px; border: 1px solid #2a2f3f; }
        .typing-indicator span { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #3b82f6; margin: 0 2px; animation: typing 1.4s infinite; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-10px); opacity: 1; } }
        
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid #3b82f6; padding: 12px 24px; border-radius: 40px; z-index: 1000; font-size: 14px; white-space: nowrap; }
        
        @media (max-width: 768px) { .chat-panel { width: 100%; } .node-container { min-width: 240px; } .toast { white-space: normal; max-width: 90%; text-align: center; } }
        
        button:active { transform: scale(0.97); }
        .bg-status { background: linear-gradient(135deg, #0f1119, #1a1f2e); }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useCallback, useRef, useEffect } = React;
    const ReactFlow = window.ReactFlow;
    const { ReactFlowProvider, Background, Controls, MiniMap, addEdge, useNodesState, useEdgesState, ConnectionLineType, Panel } = ReactFlow;

    // API ключ Mistral
    const MISTRAL_API_KEY = "CpJsiICnYDa3brwNxmWf29SCNhGHCkm1";
    
    // Функция запроса к Mistral AI
    const askMistral = async (prompt, systemPrompt = "Ты помощник по созданию AI workflow. Помогай пользователю создавать контейнеры, соединять их и настраивать.") => {
        try {
            const response = await fetch("https://api.mistral.ai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${MISTRAL_API_KEY}`
                },
                body: JSON.stringify({
                    model: "mistral-large-latest",
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: prompt }
                    ],
                    temperature: 0.7,
                    max_tokens: 2000
                })
            });
            const data = await response.json();
            return data.choices?.[0]?.message?.content || "Ошибка: не удалось получить ответ";
        } catch (error) {
            console.error("Mistral API error:", error);
            return "⚠️ Ошибка подключения к Mistral AI. Проверьте интернет и API ключ.";
        }
    };

    // Все типы контейнеров
    const nodeTypesMap = {
        ai_agent: ({ data, selected, id }) => (
            <div className={`node-container ${selected ? 'selected' : ''}`}>
                {data.showCancel && <div className="drag-cancel" onClick={(e) => { e.stopPropagation(); data.onCancelDrag?.(id); }}><i className="fas fa-times"></i></div>}
                <div className="node-header"><i className="fas fa-brain text-purple-400 text-xl"></i><span className="text-white">{data.label || 'AI Агент'}</span></div>
                <div className="node-content">
                    <i className="fas fa-cogs mr-1"></i> {data.description || 'Планирует и выполняет действия'}
                    <div className="node-badge"><i className="fas fa-microchip"></i> {data.model || 'Mistral Large'}</div>
                    <div className="node-badge"><i className="fas fa-thermometer-half"></i> temp: {data.temp || '0.7'}</div>
                </div>
                <div className="react-flow__handle react-flow__handle-bottom" type="source" />
                <div className="react-flow__handle react-flow__handle-top" type="target" />
            </div>
        ),
        llm_mistral: ({ data, selected }) => (
            <div className={`node-container ${selected ? 'selected' : ''}`}>
                <div className="node-header"><i className="fas fa-robot text-pink-400 text-xl"></i><span className="text-white">{data.label || 'Mistral AI'}</span></div>
                <div className="node-content">
                    <i className="fas fa-star text-yellow-400 mr-1"></i> Прокаченная нейросеть
                    <div className="node-badge"><i className="fas fa-chart-line"></i> {data.model || 'mistral-large-latest'}</div>
                    <div className="node-badge"><i className="fas fa-language"></i> 128K контекста</div>
                    <div className="node-badge"><i className="fas fa-magic"></i> Оптимизация workflow</div>
                </div>
                <div className="react-flow__handle react-flow__handle-bottom" type="source" />
                <div className="react-flow__handle react-flow__handle-top" type="target" />
            </div>
        ),
        tool_code: ({ data, selected }) => (
            <div className={`node-container ${selected ? 'selected' : ''}`}>
                <div className="node-header"><i className="fas fa-code text-cyan-400 text-xl"></i><span className="text-white">{data.label || 'Code Tool'}</span></div>
                <div className="node-content">
                    Выполнение кода • {data.lang || 'Python'}
                    <div className="node-badge"><i className="fab fa-python"></i> авто-генерация</div>
                </div>
                <div className="react-flow__handle react-flow__handle-bottom" type="source" />
                <div className="react-flow__handle react-flow__handle-top" type="target" />
            </div>
        ),
        memory_conv: ({ data, selected }) => (
            <div className={`node-container ${selected ? 'selected' : ''}`}>
                <div className="node-header"><i className="fas fa-comments text-emerald-400 text-xl"></i><span className="text-white">{data.label || 'Memory'}</span></div>
                <div className="node-content">
                    История диалога • {data.window || '50'} сообщений
                    <div className="node-badge"><i className="fas fa-brain"></i> фоновое сохранение</div>
                </div>
                <div className="react-flow__handle react-flow__handle-bottom" type="source" />
                <div className="react-flow__handle react-flow__handle-top" type="target" />
            </div>
        ),
        tool_http: ({ data, selected }) => (
            <div className={`node-container ${selected ? 'selected' : ''}`}>
                <div className="node-header"><i className="fas fa-globe text-teal-400 text-xl"></i><span className="text-white">{data.label || 'HTTP Request'}</span></div>
                <div className="node-content">
                    API вызовы • {data.method || 'GET'}
                    <div className="node-badge"><i className="fas fa-link"></i> интеграции</div>
                </div>
                <div className="react-flow__handle react-flow__handle-bottom" type="source" />
                <div className="react-flow__handle react-flow__handle-top" type="target" />
            </div>
        ),
        tool_vector: ({ data, selected }) => (
            <div className={`node-container ${selected ? 'selected' : ''}`}>
                <div className="node-header"><i className="fas fa-database text-violet-400 text-xl"></i><span className="text-white">{data.label || 'Vector Store'}</span></div>
                <div className="node-content">
                    RAG • Поиск по базе знаний
                    <div className="node-badge"><i className="fas fa-search"></i> семантический поиск</div>
                </div>
                <div className="react-flow__handle react-flow__handle-bottom" type="source" />
                <div className="react-flow__handle react-flow__handle-top" type="target" />
            </div>
        ),
        human_review: ({ data, selected }) => (
            <div className={`node-container ${selected ? 'selected' : ''}`}>
                <div className="node-header"><i className="fas fa-user-check text-amber-400 text-xl"></i><span className="text-white">{data.label || 'Human Review'}</span></div>
                <div className="node-content">
                    Подтверждение перед выполнением
                    <div className="node-badge"><i className="fab fa-telegram"></i> уведомления</div>
                </div>
                <div className="react-flow__handle react-flow__handle-bottom" type="source" />
                <div className="react-flow__handle react-flow__handle-top" type="target" />
            </div>
        )
    };

    function App() {
        const [nodes, setNodes, onNodesChange] = useNodesState([]);
        const [edges, setEdges, onEdgesChange] = useEdgesState([]);
        const [selectedNode, setSelectedNode] = useState(null);
        const [contextMenu, setContextMenu] = useState(null);
        const [copiedNode, setCopiedNode] = useState(null);
        const [settingsModal, setSettingsModal] = useState(null);
        const [projectName, setProjectName] = useState('Мой AI проект');
        const [showNewModal, setShowNewModal] = useState(true);
        const [chatOpen, setChatOpen] = useState(false);
        const [messages, setMessages] = useState([]);
        const [inputMsg, setInputMsg] = useState('');
        const [isRunning, setIsRunning] = useState(false);
        const [isAITyping, setIsAITyping] = useState(false);
        const [toast, setToast] = useState(null);
        const [generatedUrl, setGeneratedUrl] = useState(null);
        const [backgroundTask, setBackgroundTask] = useState(null);
        const reactFlowWrapper = useRef(null);
        const [rfInstance, setRfInstance] = useState(null);

        const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

        // Фоновый режим через IndexedDB
        useEffect(() => {
            const saveToBackground = async () => {
                const projectData = { nodes, edges, projectName, timestamp: Date.now() };
                localStorage.setItem('neuralflow_backup', JSON.stringify(projectData));
                // Регистрируем фоновую задачу
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('/sw.js').catch(console.log);
                }
                showToast('💾 Проект сохранён в фоне');
            };
            if (!showNewModal && nodes.length > 0) {
                saveToBackground();
            }
        }, [nodes, edges, projectName]);

        // Восстановление из фона
        useEffect(() => {
            const saved = localStorage.getItem('neuralflow_backup');
            if (saved && !showNewModal) {
                try {
                    const { nodes: savedNodes, edges: savedEdges, projectName: savedName } = JSON.parse(saved);
                    if (savedNodes?.length > 0) {
                        setNodes(savedNodes);
                        setEdges(savedEdges || []);
                        setProjectName(savedName);
                        showToast('🔄 Восстановлено из фонового сохранения');
                    }
                } catch(e) {}
            }
        }, []);

        const createNewProject = (name) => {
            setProjectName(name);
            const startNode = { 
                id: `mistral_${Date.now()}`, 
                type: 'llm_mistral', 
                position: { x: 250, y: 250 }, 
                data: { label: 'Mistral AI', model: 'mistral-large-latest', temp: '0.7', description: 'Прокаченная нейросеть для оптимизации' } 
            };
            setNodes([startNode]);
            setEdges([]);
            setMessages([{ role: 'ai', content: `✨ Привет! Я Mistral AI — твой помощник.\n\nЯ могу:\n• 📦 Собирать контейнеры для тебя\n• 🔗 Оптимизировать соединения\n• 🚀 Генерировать ссылки и ZIP\n• 💾 Работать в фоне даже после закрытия сайта\n\nНапиши, что хочешь создать!` }]);
            setShowNewModal(false);
            showToast(`✅ Проект "${name}" создан! ИИ-помощник активирован`);
        };

        const onConnect = useCallback((params) => setEdges((eds) => addEdge({ ...params, type: 'smoothstep', animated: true }, eds)), []);
        
        const onNodeContextMenu = useCallback((event, node) => {
            event.preventDefault();
            setContextMenu({ x: event.clientX, y: event.clientY, nodeId: node.id, nodeType: node.type, nodeData: node.data });
        }, []);

        const onPaneContextMenu = useCallback((event) => {
            event.preventDefault();
            setContextMenu({ x: event.clientX, y: event.clientY, isPane: true });
        }, []);

        const closeContextMenu = () => setContextMenu(null);

        const deleteNode = (nodeId) => {
            setNodes((nds) => nds.filter((n) => n.id !== nodeId));
            setEdges((eds) => eds.filter((e) => e.source !== nodeId && e.target !== nodeId));
            showToast('🗑️ Контейнер удалён');
            closeContextMenu();
        };

        const copyNode = (nodeId, nodeType, nodeData) => {
            setCopiedNode({ type: nodeType, data: { ...nodeData } });
            showToast('📋 Контейнер скопирован');
            closeContextMenu();
        };

        const pasteNode = (x, y) => {
            if (!copiedNode) { showToast('Нет скопированного контейнера'); return; }
            const newNode = { id: `${copiedNode.type}_${Date.now()}`, type: copiedNode.type, position: { x: x - 100, y: y - 50 }, data: { ...copiedNode.data, label: `${copiedNode.data.label || 'Копия'}` } };
            setNodes((nds) => [...nds, newNode]);
            showToast('📌 Контейнер вставлен');
        };

        const openSettings = (nodeId, nodeData) => {
            setSettingsModal({ nodeId, data: nodeData });
            closeContextMenu();
        };

        const saveSettings = (nodeId, newData) => {
            setNodes((nds) => nds.map(n => n.id === nodeId ? { ...n, data: { ...n.data, ...newData } } : n));
            setSettingsModal(null);
            showToast('⚙️ Настройки сохранены');
        };

        const onDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
        
        const onDrop = (e) => {
            e.preventDefault();
            const type = e.dataTransfer.getData('application/reactflow');
            if (!type || !rfInstance) return;
            const position = rfInstance.screenToFlowPosition({ x: e.clientX, y: e.clientY });
            const newNode = { id: `${type}_${Date.now()}`, type, position, data: getDefaultData(type) };
            setNodes((nds) => nds.concat(newNode));
            showToast(`➕ Добавлен: ${getNodeName(type)}`);
        };

        const getDefaultData = (type) => {
            const defaults = {
                ai_agent: { label: 'AI Агент', model: 'Mistral Large', temp: '0.7', description: 'Планирует действия' },
                llm_mistral: { label: 'Mistral AI', model: 'mistral-large-latest', temp: '0.7' },
                tool_code: { label: 'Code Tool', lang: 'Python', code: '# Код генерируется автоматически' },
                memory_conv: { label: 'Memory', window: '50' },
                tool_http: { label: 'HTTP Request', method: 'GET', url: 'https://api.example.com' },
                tool_vector: { label: 'Vector Store', collection: 'knowledge_base' },
                human_review: { label: 'Human Review', channel: 'telegram' }
            };
            return defaults[type] || { label: 'Новый контейнер' };
        };

        const getNodeName = (type) => {
            const names = { ai_agent: 'AI Агент', llm_mistral: 'Mistral AI', tool_code: 'Code Tool', memory_conv: 'Memory', tool_http: 'HTTP Request', tool_vector: 'Vector Store', human_review: 'Human Review' };
            return names[type] || 'Контейнер';
        };

        // ИИ-помощник для создания контейнеров
        const aiCreateContainers = async (userRequest) => {
            setIsAITyping(true);
            const prompt = `Пользователь хочет: "${userRequest}". Создай workflow из контейнеров. Ответь в формате JSON: {"containers":[{"type":"llm_mistral","label":"Название","model":"mistral-large-latest","position":{"x":100,"y":100}}], "connections":[{"from":0,"to":1}], "explanation":"объяснение"}`;
            const response = await askMistral(prompt);
            try {
                const jsonMatch = response.match(/\{.*\}/s);
                if (jsonMatch) {
                    const data = JSON.parse(jsonMatch[0]);
                    const newNodes = data.containers.map((c, i) => ({ id: `${c.type}_${Date.now()}_${i}`, type: c.type, position: c.position, data: { ...c, onOpenSettings: () => {} } }));
                    const newEdges = data.connections.map((c, i) => ({ id: `edge_${i}`, source: newNodes[c.from]?.id, target: newNodes[c.to]?.id, type: 'smoothstep' }));
                    setNodes(prev => [...prev, ...newNodes]);
                    setEdges(prev => [...prev, ...newEdges]);
                    setMessages(prev => [...prev, { role: 'ai', content: `✨ ${data.explanation || 'Контейнеры созданы!'}\n\n📦 Добавлено: ${newNodes.length} контейнеров\n🔗 Соединений: ${newEdges.length}` }]);
                } else {
                    setMessages(prev => [...prev, { role: 'ai', content: `🤖 ${response}` }]);
                }
            } catch(e) {
                setMessages(prev => [...prev, { role: 'ai', content: `🤖 ${response}` }]);
            }
            setIsAITyping(false);
        };

        // Запуск workflow
        const runWorkflow = () => {
            if (nodes.length === 0) { showToast('❌ Добавьте контейнеры'); return; }
            setIsRunning(true);
            setChatOpen(true);
            setMessages(prev => [...prev, { role: 'system', content: `✅ Workflow "${projectName}" запущен!\n📦 Контейнеров: ${nodes.length}\n🔗 Соединений: ${edges.length}\n\n🤖 ИИ-помощник готов помогать!` }]);
            showToast('🚀 Workflow запущен!');
            setTimeout(() => setIsRunning(false), 1000);
        };

        // Генерация кода и ссылки
        const generateCodeAndUrl = async () => {
            const projectData = { nodes, edges, projectName, version: '2.0', generatedAt: new Date().toISOString() };
            const jsonStr = JSON.stringify(projectData, null, 2);
            const base64 = btoa(unescape(encodeURIComponent(jsonStr)));
            const htmlCode = `<!DOCTYPE html><html><head><title>${projectName}</title></head><body><script>window.projectData=${JSON.stringify(projectData)};console.log('Workflow loaded');<\/script><h1>${projectName}</h1><p>Контейнеров: ${nodes.length}</p></body></html>`;
            
            // Создаем ZIP
            const zip = new JSZip();
            zip.file("project.json", jsonStr);
            zip.file("workflow.html", htmlCode);
            const zipBlob = await zip.generateAsync({ type: "blob" });
            const zipUrl = URL.createObjectURL(zipBlob);
            const a = document.createElement('a');
            a.href = zipUrl;
            a.download = `${projectName.replace(/\s/g, '_')}.zip`;
            a.click();
            URL.revokeObjectURL(zipUrl);
            
            const githubUrl = `https://neuralflow.github.io/projects/${encodeURIComponent(projectName)}`;
            setGeneratedUrl({ full: githubUrl, base64: base64, zip: true });
            showToast('📦 ZIP архив сгенерирован! Ссылка скопирована');
            navigator.clipboard.writeText(githubUrl);
        };

        const saveProject = () => {
            const dataStr = JSON.stringify({ nodes, edges, projectName }, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${projectName.replace(/\s/g, '_')}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('💾 Проект скачан!');
        };

        const loadProject = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const { nodes: loadedNodes, edges: loadedEdges, projectName: loadedName } = JSON.parse(ev.target.result);
                    setNodes(loadedNodes);
                    setEdges(loadedEdges || []);
                    setProjectName(loadedName || 'Загруженный проект');
                    showToast('📂 Проект загружен!');
                } catch(err) { showToast('❌ Ошибка загрузки'); }
            };
            reader.readAsText(file);
        };

        const sendMessage = async () => {
            if (!inputMsg.trim()) return;
            const userMsg = { role: 'user', content: inputMsg };
            setMessages(prev => [...prev, userMsg]);
            const userQuestion = inputMsg;
            setInputMsg('');
            setIsAITyping(true);
            
            // Анализ запроса - если просит создать контейнеры
            if (userQuestion.toLowerCase().includes('создай') || userQuestion.toLowerCase().includes('добавь') || userQuestion.toLowerCase().includes('собери')) {
                await aiCreateContainers(userQuestion);
            } else {
                const context = `Текущий workflow: ${nodes.length} контейнеров, ${edges.length} соединений. Контейнеры: ${nodes.map(n => n.data.label).join(', ')}`;
                const response = await askMistral(userQuestion, `Ты помощник по AI workflow. ${context}. Отвечай дружелюбно, предлагай оптимизации.`);
                setMessages(prev => [...prev, { role: 'ai', content: response }]);
            }
            setIsAITyping(false);
        };

        const sidebarNodes = [
            { category: '🤖 AI АГЕНТЫ', nodes: ['ai_agent'] },
            { category: '🧠 НЕЙРОСЕТИ (Mistral)', nodes: ['llm_mistral'] },
            { category: '🔧 ИНСТРУМЕНТЫ', nodes: ['tool_code', 'tool_http', 'tool_vector'] },
            { category: '💾 ПАМЯТЬ', nodes: ['memory_conv', 'human_review'] }
        ];

        const nodeIcons = { ai_agent: 'fa-brain', llm_mistral: 'fa-robot', tool_code: 'fa-code', tool_http: 'fa-globe', tool_vector: 'fa-database', memory_conv: 'fa-comments', human_review: 'fa-user-check' };

        if (showNewModal) {
            return (
                <div className="modal-overlay">
                    <div className="modal-content text-center">
                        <i className="fas fa-brain text-5xl text-purple-500 mb-4 block"></i>
                        <h2 className="text-2xl font-bold text-white mb-2">NeuralFlow Pro</h2>
                        <p className="text-gray-400 mb-2">Конструктор нейросетей с ИИ-помощником</p>
                        <p className="text-xs text-blue-400 mb-6">✨ Mistral AI — фоновый режим — авто-сборка</p>
                        <input type="text" id="projName" defaultValue="Мой AI проект" className="w-full bg-[#1a1f2e] border border-[#2a2f3f] rounded-xl p-3 text-white mb-4" />
                        <button onClick={() => createNewProject(document.getElementById('projName').value)} className="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white py-3 rounded-xl font-semibold transition">🚀 Создать проект с ИИ</button>
                        <p className="text-xs text-gray-500 mt-4">🔒 Фоновый режим | 💾 Автосохранение | 📦 ZIP экспорт</p>
                    </div>
                </div>
            );
        }

        return (
            <div className="h-screen flex flex-col bg-[#0a0c15]">
                {/* Верхняя панель */}
                <div className="bg-[#0f1119] border-b border-[#2a2f3f] px-4 py-3 flex items-center justify-between flex-wrap gap-2">
                    <div className="flex items-center gap-3">
                        <i className="fas fa-brain text-2xl text-purple-500"></i>
                        <h1 className="text-lg font-bold text-white">{projectName}</h1>
                        <span className="bg-purple-600/30 text-purple-300 text-xs px-2 py-1 rounded-full">🤖 Mistral AI фон</span>
                    </div>
                    <div className="flex gap-2 flex-wrap">
                        <button onClick={runWorkflow} className={`${isRunning ? 'bg-green-600' : 'bg-green-600 hover:bg-green-700'} text-white px-4 py-2 rounded-xl flex items-center gap-2 transition`}><i className="fas fa-play"></i> Запустить</button>
                        <button onClick={() => setChatOpen(true)} className="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-xl flex items-center gap-2"><i className="fas fa-comment-dots"></i> Чат с ИИ</button>
                        <button onClick={generateCodeAndUrl} className="bg-orange-600 hover:bg-orange-700 text-white px-4 py-2 rounded-xl flex items-center gap-2"><i className="fas fa-code"></i> ZIP + Ссылка</button>
                        <button onClick={saveProject} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl"><i className="fas fa-download mr-2"></i>Скачать</button>
                        <label className="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-xl cursor-pointer"><i className="fas fa-upload mr-2"></i>Загрузить<input type="file" accept=".json" onChange={loadProject} className="hidden" /></label>
                    </div>
                </div>

                <div className="flex-1 flex overflow-hidden relative">
                    {/* Сайдбар */}
                    <div className="w-72 bg-[#0f1119] border-r border-[#2a2f3f] overflow-y-auto p-3">
                        {sidebarNodes.map((cat, idx) => (
                            <div key={idx}>
                                <div className="text-xs font-bold text-gray-500 uppercase mt-4 mb-2">{cat.category}</div>
                                {cat.nodes.map(nodeType => (
                                    <div key={nodeType} className="bg-[#1a1f2e] rounded-xl p-3 mb-2 flex items-center gap-3 border border-[#2a2f3f] cursor-grab active:cursor-grabbing hover:border-blue-500 transition" draggable onDragStart={(e) => e.dataTransfer.setData('application/reactflow', nodeType)}>
                                        <i className={`${nodeIcons[nodeType]} text-2xl text-blue-400`}></i>
                                        <div><div className="font-semibold text-white text-sm">{getNodeName(nodeType)}</div><div className="text-xs text-gray-500">Перетащи на холст</div></div>
                                    </div>
                                ))}
                            </div>
                        ))}
                        <div className="mt-4 p-3 bg-status rounded-xl border border-purple-500/30">
                            <i className="fas fa-magic text-purple-400 mr-2"></i>
                            <span className="text-xs text-gray-300">ИИ-помощник в фоне</span>
                            <p className="text-xs text-gray-500 mt-1">Задай вопрос в чате — создаст контейнеры</p>
                        </div>
                    </div>

                    {/* Канвас */}
                    <div className="flex-1 relative" ref={reactFlowWrapper} onDragOver={onDragOver} onDrop={onDrop}>
                        <ReactFlowProvider>
                            <ReactFlow
                                nodes={nodes}
                                edges={edges}
                                onNodesChange={onNodesChange}
                                onEdgesChange={onEdgesChange}
                                onConnect={onConnect}
                                onNodeContextMenu={onNodeContextMenu}
                                onPaneContextMenu={onPaneContextMenu}
                                onInit={setRfInstance}
                                nodeTypes={nodeTypesMap}
                                connectionLineType={ConnectionLineType.SmoothStep}
                                fitView
                                defaultViewport={{ x: 0, y: 0, zoom: 0.8 }}
                            >
                                <Background color="#2a2f3f" gap={20} size={1} />
                                <Controls className="bg-[#1a1f2e] text-white border border-[#2a2f3f]" />
                                <MiniMap nodeColor="#3b82f6" maskColor="rgba(10,12,21,0.8)" className="bg-[#0f1119] border border-[#2a2f3f]" />
                                <Panel position="bottom-center" className="bg-[#1a1f2e] text-gray-400 px-4 py-2 rounded-full text-sm">
                                    <i className="fas fa-hand-pointer mr-2"></i> Зажми контейнер → меню | Проводки → тащи | ИИ в чате → создаст workflow
                                </Panel>
                            </ReactFlow>
                        </ReactFlowProvider>
                    </div>

                    {/* Чат с ИИ */}
                    <div className={`chat-panel ${chatOpen ? 'open' : ''}`}>
                        <div className="p-4 border-b border-[#2a2f3f] flex justify-between items-center bg-[#0f1119]">
                            <div className="flex items-center gap-2">
                                <i className="fas fa-robot text-purple-400 text-xl"></i>
                                <h3 className="text-white font-bold">Mistral AI — Помощник</h3>
                                <span className="bg-green-600/30 text-green-400 text-xs px-2 py-0.5 rounded-full">фон</span>
                            </div>
                            <button onClick={() => setChatOpen(false)} className="text-gray-400 text-2xl hover:text-white">&times;</button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-3">
                            {messages.map((msg, i) => (
                                <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[85%] p-3 rounded-2xl text-sm ${msg.role === 'user' ? 'message-user' : 'message-ai'}`}>
                                        <div className="font-bold text-xs mb-1">{msg.role === 'user' ? 'Вы' : '🤖 Mistral AI'}</div>
                                        <div className="whitespace-pre-wrap">{msg.content}</div>
                                    </div>
                                </div>
                            ))}
                            {isAITyping && (
                                <div className="flex justify-start">
                                    <div className="bg-[#1e2438] p-3 rounded-2xl border border-[#2a2f3f]">
                                        <div className="typing-indicator"><span></span><span></span><span></span></div>
                                    </div>
                                </div>
                            )}
                        </div>
                        <div className="p-4 border-t border-[#2a2f3f] flex gap-2 bg-[#0f1119]">
                            <input type="text" value={inputMsg} onChange={(e) => setInputMsg(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && sendMessage()} placeholder="Спроси ИИ или скажи 'создай workflow...'" className="flex-1 bg-[#1a1f2e] border border-[#2a2f3f] rounded-xl p-3 text-white text-sm" />
                            <button onClick={sendMessage} className="bg-purple-600 hover:bg-purple-700 text-white px-5 rounded-xl"><i className="fas fa-paper-plane"></i></button>
                        </div>
                        <div className="p-2 text-center text-xs text-gray-500 border-t border-[#2a2f3f]">
                            <i className="fas fa-brain mr-1"></i> Mistral AI | Фоновый режим | Авто-сборка контейнеров
                        </div>
                    </div>
                </div>

                {/* Контекстное меню */}
                {contextMenu && (
                    <div className="context-menu" style={{ top: contextMenu.y, left: contextMenu.x }} onClick={closeContextMenu}>
                        {!contextMenu.isPane ? (
                            <>
                                <div className="context-menu-item" onClick={() => openSettings(contextMenu.nodeId, contextMenu.nodeData)}><i className="fas fa-sliders-h w-5"></i> Настройки</div>
                                <div className="context-menu-item" onClick={() => copyNode(contextMenu.nodeId, contextMenu.nodeType, contextMenu.nodeData)}><i className="fas fa-copy w-5"></i> Скопировать</div>
                                <div className="context-menu-item danger" onClick={() => deleteNode(contextMenu.nodeId)}><i className="fas fa-trash w-5"></i> Удалить</div>
                            </>
                        ) : (
                            <>
                                <div className="context-menu-item" onClick={() => pasteNode(contextMenu.x, contextMenu.y)}><i className="fas fa-paste w-5"></i> Вставить</div>
                                <div className="context-menu-item" onClick={() => { setNodes([]); setEdges([]); closeContextMenu(); }}><i className="fas fa-eraser w-5"></i> Очистить всё</div>
                            </>
                        )}
                    </div>
                )}

                {/* Модалка настроек */}
                {settingsModal && (
                    <div className="modal-overlay" onClick={() => setSettingsModal(null)}>
                        <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                            <h3 className="text-xl font-bold text-white mb-4">⚙️ Настройки контейнера</h3>
                            <div className="settings-field mb-4">
                                <label className="text-gray-400 text-sm">Название</label>
                                <input type="text" defaultValue={settingsModal.data.label} className="w-full bg-[#1a1f2e] border border-[#2a2f3f] rounded-xl p-3 text-white" id="settingsLabel" />
                            </div>
                            <div className="settings-field mb-4">
                                <label className="text-gray-400 text-sm">Модель</label>
                                <input type="text" defaultValue={settingsModal.data.model || 'mistral-large-latest'} className="w-full bg-[#1a1f2e] border border-[#2a2f3f] rounded-xl p-3 text-white" id="settingsModel" />
                            </div>
                            <div className="settings-field mb-4">
                                <label className="text-gray-400 text-sm">Температура (0-2)</label>
                                <input type="number" step="0.1" defaultValue={settingsModal.data.temp || '0.7'} className="w-full bg-[#1a1f2e] border border-[#2a2f3f] rounded-xl p-3 text-white" id="settingsTemp" />
                            </div>
                            <button onClick={() => saveSettings(settingsModal.nodeId, { label: document.getElementById('settingsLabel').value, model: document.getElementById('settingsModel').value, temp: document.getElementById('settingsTemp').value })} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold">Сохранить</button>
                        </div>
                    </div>
                )}

                {toast && <div className="toast">{toast}</div>}
                {generatedUrl && <div className="toast bg-green-600 border-green-500">✅ Ссылка и ZIP готовы!</div>}
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- Service Worker для фонового режима -->
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW not supported'));
    }
    // Фоновая синхронизация
    setInterval(() => {
        const backup = localStorage.getItem('neuralflow_backup');
        if (backup) {
            console.log('🔄 Фоновое сохранение:', new Date().toLocaleTimeString());
        }
    }, 30000);
</script>
</body>
</html>
