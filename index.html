<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин — Проверка ключа</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: monospace;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        .info a {
            color: #667eea;
            text-decoration: none;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Магазин</h1>
            <p>Введите ключ для доступа</p>
        </div>
        <div class="content">
            <div class="form-group">
                <label>Приватный ключ</label>
                <input type="text" id="keyInput" placeholder="Введите ключ..." autocomplete="off">
            </div>
            <button id="checkBtn" onclick="checkKey()">Проверить ключ</button>
            <div id="result"></div>
            <div class="info">
                💡 Нет ключа? Купите его в <a href="https://t.me/ваш_бот" target="_blank">Telegram боте</a>
            </div>
        </div>
    </div>

    <script>
        // URL для проверки ключа через бота
        // ВАЖНО: нужно создать вебхук или использовать polling
        // Простой способ: сохраняем ключи в localStorage (для демо)
        // Реальный способ: бот должен иметь API endpoint
        
        // === ВАРИАНТ 1: Локальное хранение ключей (для теста) ===
        // Ключи, которые были куплены в боте, нужно добавлять сюда вручную
        // Или бот может сохранять их в файл, который читает сайт
        
        let validKeys = [];
        
        // Загружаем ключи из localStorage
        function loadKeys() {
            const saved = localStorage.getItem('valid_keys');
            if (saved) {
                validKeys = JSON.parse(saved);
            }
        }
        
        // Сохраняем ключ
        function saveKey(key) {
            if (!validKeys.includes(key)) {
                validKeys.push(key);
                localStorage.setItem('valid_keys', JSON.stringify(validKeys));
            }
        }
        
        // Проверка ключа
        function checkKey() {
            const input = document.getElementById('keyInput');
            const key = input.value.trim();
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('checkBtn');
            
            if (!key) {
                showResult('❌ Введите ключ', 'error');
                return;
            }
            
            // Показываем загрузку
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Проверка...';
            
            // Имитация проверки (в реальности будет запрос к боту)
            setTimeout(() => {
                loadKeys();
                
                if (validKeys.includes(key)) {
                    showResult('✅ Ключ верный! Доступ разрешён.', 'success');
                    // Здесь можно перенаправить на защищённую страницу
                    // window.location.href = '/dashboard.html';
                } else {
                    showResult('❌ Неверный ключ. Доступ запрещён.', 'error');
                }
                
                btn.disabled = false;
                btn.innerHTML = 'Проверить ключ';
            }, 500);
        }
        
        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `<div class="result ${type}">${message}</div>`;
        }
        
        // Добавить ключ (для админа/бота) - можно вызывать из консоли или через API
        window.addValidKey = function(key) {
            saveKey(key);
            console.log('Ключ добавлен:', key);
            return true;
        };
        
        // Показать все ключи (для админа)
        window.showKeys = function() {
            loadKeys();
            console.log('Все ключи:', validKeys);
            return validKeys;
        };
        
        // Загружаем ключи при старте
        loadKeys();
        
        // Нажать Enter для проверки
        document.getElementById('keyInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkKey();
            }
        });
        
        console.log('Сайт готов! Используйте addValidKey("ключ") для добавления ключей');
        console.log('Или showKeys() для просмотра всех ключей');
    </script>
</body>
</html>
