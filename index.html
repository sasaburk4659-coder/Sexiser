<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой сайт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
            padding: 40px;
        }
        
        h1 {
            font-size: 48px;
            color: #333;
            margin-bottom: 20px;
        }
        
        p {
            font-size: 18px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .blocked {
            background: #ffebee;
            border: 2px solid #f44336;
            border-radius: 10px;
            padding: 30px;
            max-width: 500px;
        }
        
        .blocked h1 {
            color: #f44336;
        }
        
        .blocked p {
            color: #d32f2f;
        }
        
        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div id="content">
        <!-- Содержимое будет загружено через JavaScript -->
        <div class="container">
            <h1>📄 Белая страница</h1>
            <p>Это простой HTML сайт</p>
            <p>Ничего лишнего</p>
        </div>
    </div>
    <div class="status" id="status">Статус: проверка...</div>

    <script>
        // Проверяем статус сайта через API
        async function checkStatus() {
            try {
                // Запрос к вашему Python серверу
                const response = await fetch('http://localhost:5000/api/manage', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        password: 'secret123',  // Тот же пароль
                        action: 'status'
                    })
                });
                
                const data = await response.json();
                
                if (data.status === 'ok') {
                    if (data.blocked) {
                        // Сайт заблокирован
                        document.getElementById('content').innerHTML = `
                            <div class="blocked">
                                <h1>⛔ САЙТ ЗАБЛОКИРОВАН</h1>
                                <p>${data.message}</p>
                            </div>
                        `;
                        document.getElementById('status').innerHTML = `🔴 Заблокирован: ${data.message}`;
                    } else {
                        // Сайт работает
                        document.getElementById('content').innerHTML = `
                            <div class="container">
                                <h1>📄 Белая страница</h1>
                                <p>Это простой HTML сайт</p>
                                <p>${data.message}</p>
                            </div>
                        `;
                        document.getElementById('status').innerHTML = `🟢 Сайт работает: ${data.message}`;
                    }
                }
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('status').innerHTML = '⚠️ Не удалось подключиться к серверу';
            }
        }
        
        // Проверяем статус каждые 5 секунд
        checkStatus();
        setInterval(checkStatus, 5000);
    </script>
</body>
</html>
