<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Террариум | 2D Игра</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at 20% 30%, #1b3b2b, #0a1f1a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            padding: 10px;
        }
        .game-container {
            background: #1f2a1b;
            border-radius: 48px;
            padding: 15px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            border-radius: 24px;
            box-shadow: 0 0 0 3px #aa8e54;
            width: 100%;
            height: auto;
        }
        .info-panel {
            margin-top: 15px;
            background: #0f1f12d9;
            border-radius: 28px;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 8px;
            color: #f9e2a1;
        }
        .stat {
            background: #241f12;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        button {
            background: #6b4c2c;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 55px);
            grid-template-rows: repeat(3, 55px);
            gap: 5px;
            background: rgba(0,0,0,0.5);
            border-radius: 70px;
            padding: 10px;
        }
        .dpad-btn {
            background: #3a2a1f;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 0 #1a1208;
        }
        .dpad-btn:active { transform: translateY(2px); }
        .action-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #5f4a2e;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 0 #2f2a1a;
        }
        .joystick-area { display: flex; justify-content: space-between; margin-top: 15px; flex-wrap: wrap; gap: 15px; }
        .server-status {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: #1f3a2a;
            text-align: center;
            margin-top: 10px;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .loading-box {
            background: #2a2a1c;
            border-radius: 48px;
            padding: 40px;
            text-align: center;
            width: 300px;
        }
        .error-msg { color: #ff8888; font-size: 0.9rem; margin-top: 15px; }
        .retry-btn {
            margin-top: 20px;
            background: #6b4c2c;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
        }
        .hidden { display: none; }
        @media (max-width: 700px) {
            .dpad { transform: scale(0.7); margin: -10px; }
            .stat { font-size: 0.65rem; }
            .action-btn { width: 55px; height: 55px; font-size: 24px; }
        }
    </style>
</head>
<body>
<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-box">
        <h2>🌍 ТЕРРАРИУМ</h2>
        <div id="loadingStatus" style="margin: 20px 0;">🔄 Подключение к движку...</div>
        <div id="errorMessage" class="error-msg hidden"></div>
        <div id="retryButton" class="retry-btn hidden" onclick="retryConnect()">🔄 ПОВТОРИТЬ</div>
    </div>
</div>

<div id="gameUI" class="hidden">
    <div class="game-container">
        <canvas id="gameCanvas" width="900" height="550"></canvas>
        <div class="info-panel">
            <div class="stat">🧙 <span id="playerName">---</span></div>
            <div class="stat">💰 <span id="goldAmount">0</span></div>
            <div class="stat">🪨 <span id="oreAmount">0</span></div>
            <div class="stat">🌱 <span id="seedAmount">0</span></div>
            <div class="stat">💎 <span id="crystalAmount">0</span></div>
            <button id="mineBtn">⛏️ Копать</button>
        </div>
        <div class="joystick-area">
            <div class="dpad">
                <div></div><div class="dpad-btn" data-dir="up">▲</div><div></div>
                <div class="dpad-btn" data-dir="left">◀</div><div></div><div class="dpad-btn" data-dir="right">▶</div>
                <div></div><div class="dpad-btn" data-dir="down">▼</div><div></div>
            </div>
            <div class="action-btn" id="interactBtn">🤝</div>
        </div>
        <div class="server-status" id="serverStatus">🟢 Игра активна</div>
    </div>
</div>

<script>
    // ========== ПОДКЛЮЧЕНИЕ К ДВИЖКУ ==========
    const ENGINE_URL = "https://sasaburk4659-coder.github.io/-/";
    const PLAYER_NAME = "Искатель_" + Math.floor(Math.random() * 1000);
    
    let sessionId = null;
    let playerData = null;
    let playerX = 450, playerY = 300;
    let targetX = 450, targetY = 300;
    let otherPlayers = [];
    let reconnectTimer = null;
    
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Загрузка движка в iframe (для доступа к localStorage API)
    let engineFrame = null;
    
    function initEngine() {
        return new Promise((resolve, reject) => {
            engineFrame = document.createElement('iframe');
            engineFrame.src = ENGINE_URL;
            engineFrame.style.display = 'none';
            document.body.appendChild(engineFrame);
            
            engineFrame.onload = () => {
                setTimeout(() => {
                    try {
                        const engineAPI = engineFrame.contentWindow.TerraEngine;
                        if (engineAPI) {
                            resolve(engineAPI);
                        } else {
                            reject(new Error("Engine API not found"));
                        }
                    } catch(e) {
                        reject(e);
                    }
                }, 500);
            };
            
            setTimeout(() => reject(new Error("Timeout")), 5000);
        });
    }
    
    let engineAPI = null;
    
    async function startGame() {
        const loadingStatus = document.getElementById('loadingStatus');
        const errorMessage = document.getElementById('errorMessage');
        const retryBtn = document.getElementById('retryButton');
        
        loadingStatus.innerHTML = "🔄 Подключение к движку...";
        
        try {
            if (!engineAPI) {
                engineAPI = await initEngine();
            }
            
            const status = engineAPI.getStatus();
            
            if (!status.running) {
                loadingStatus.innerHTML = "⛔ ДВИЖОК ОСТАНОВЛЕН!";
                errorMessage.innerHTML = "Игровой движок остановлен администратором.<br>Игра временно недоступна.";
                errorMessage.classList.remove('hidden');
                retryBtn.classList.remove('hidden');
                return;
            }
            
            loadingStatus.innerHTML = "🔌 Вход в игровой мир...";
            
            const joinResult = engineAPI.join(PLAYER_NAME);
            
            if (joinResult.success) {
                sessionId = joinResult.sessionId;
                playerData = joinResult.playerData;
                playerX = playerData.x;
                playerY = playerData.y;
                targetX = playerX;
                targetY = playerY;
                
                updateUI();
                
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('gameUI').classList.remove('hidden');
                
                // Запускаем игровые циклы
                setInterval(() => updatePosition(), 50);
                setInterval(() => fetchOtherPlayers(), 200);
                setInterval(() => syncPlayerData(), 3000);
                
                drawGame();
            } else {
                loadingStatus.innerHTML = "❌ Ошибка подключения!";
                errorMessage.innerHTML = "Не удалось подключиться к движку.";
                errorMessage.classList.remove('hidden');
                retryBtn.classList.remove('hidden');
            }
        } catch(e) {
            console.error("Connection error:", e);
            loadingStatus.innerHTML = "❌ Не удалось подключиться к движку!";
            errorMessage.innerHTML = "Движок недоступен. Проверьте URL и интернет.";
            errorMessage.classList.remove('hidden');
            retryBtn.classList.remove('hidden');
        }
    }
    
    function syncPlayerData() {
        if (!sessionId || !playerData || !engineAPI) return;
        const result = engineAPI.sync(sessionId, playerData);
        if (result.success) playerData = result.playerData;
        updateUI();
    }
    
    function updatePosition() {
        if (!sessionId || !engineAPI) return;
        playerX += (targetX - playerX) * 0.3;
        playerY += (targetY - playerY) * 0.3;
        engineAPI.move(sessionId, playerX, playerY);
    }
    
    function fetchOtherPlayers() {
        if (!sessionId || !engineAPI) return;
        const result = engineAPI.getPlayers();
        if (result && !result.error) {
            otherPlayers = result.filter(p => p.id !== sessionId);
        }
    }
    
    function updateUI() {
        if (playerData) {
            document.getElementById('playerName').innerText = playerData.name;
            document.getElementById('goldAmount').innerText = playerData.gold;
            document.getElementById('oreAmount').innerText = playerData.ore;
            document.getElementById('seedAmount').innerText = playerData.seeds;
            document.getElementById('crystalAmount').innerText = playerData.crystals || 12;
        }
    }
    
    function mineResources() {
        if (!playerData) return;
        const goldGain = Math.floor(Math.random() * 40) + 15;
        const oreGain = Math.floor(Math.random() * 20) + 8;
        playerData.gold += goldGain;
        playerData.ore += oreGain;
        updateUI();
        syncPlayerData();
        
        const msg = document.createElement('div');
        msg.style.position = 'fixed';
        msg.style.bottom = '100px';
        msg.style.left = '50%';
        msg.style.transform = 'translateX(-50%)';
        msg.style.background = '#ffaa44';
        msg.style.color = '#2a2a1a';
        msg.style.padding = '8px 16px';
        msg.style.borderRadius = '40px';
        msg.innerHTML = `+${goldGain}💰 +${oreGain}🪨`;
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 1500);
    }
    
    function drawGame() {
        if (!ctx) return;
        
        const grad = ctx.createLinearGradient(0, 0, 0, 400);
        grad.addColorStop(0, "#527a3b");
        grad.addColorStop(1, "#3a5a2a");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#735e3a";
        ctx.fillRect(0, 380, canvas.width, 170);
        
        ctx.fillStyle = "#5d8c48";
        for(let i = 0; i < 30; i++) ctx.fillRect(i * 35, 370, 8, 15);
        
        otherPlayers.forEach(p => {
            ctx.fillStyle = "#88aaff";
            ctx.beginPath();
            ctx.arc(p.x, p.y - 18, 14, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.font = "bold 10px monospace";
            ctx.fillText(p.name, p.x - 20, p.y - 28);
        });
        
        ctx.fillStyle = "#ffaa66";
        ctx.beginPath();
        ctx.arc(playerX, playerY - 18, 16, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#3a2a1a";
        ctx.fillRect(playerX - 6, playerY - 15, 12, 10);
        ctx.fillStyle = "white";
        ctx.font = "bold 12px monospace";
        ctx.fillText(playerData?.name || "Вы", playerX - 20, playerY - 32);
        
        ctx.fillStyle = "#aa8866";
        ctx.fillRect(playerX + 12, playerY - 22, 18, 5);
        
        requestAnimationFrame(drawGame);
    }
    
    window.retryConnect = function() {
        const errorMessage = document.getElementById('errorMessage');
        const retryBtn = document.getElementById('retryButton');
        document.getElementById('loadingStatus').innerHTML = "🔄 Повторное подключение...";
        errorMessage.classList.add('hidden');
        retryBtn.classList.add('hidden');
        
        if (engineFrame) {
            engineFrame.remove();
            engineFrame = null;
            engineAPI = null;
        }
        startGame();
    };
    
    document.querySelectorAll('.dpad-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const dir = btn.dataset.dir;
            const speed = 18;
            if(dir === 'up') targetY = Math.max(70, targetY - speed);
            if(dir === 'down') targetY = Math.min(530, targetY + speed);
            if(dir === 'left') targetX = Math.max(70, targetX - speed);
            if(dir === 'right') targetX = Math.min(830, targetX + speed);
        });
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const dir = btn.dataset.dir;
            const speed = 18;
            if(dir === 'up') targetY = Math.max(70, targetY - speed);
            if(dir === 'down') targetY = Math.min(530, targetY + speed);
            if(dir === 'left') targetX = Math.max(70, targetX - speed);
            if(dir === 'right') targetX = Math.min(830, targetX + speed);
        });
    });
    
    document.getElementById('mineBtn').onclick = () => mineResources();
    document.getElementById('interactBtn').onclick = () => {
        syncPlayerData();
        const msg = document.createElement('div');
        msg.style.position = 'fixed';
        msg.style.bottom = '100px';
        msg.style.left = '50%';
        msg.style.transform = 'translateX(-50%)';
        msg.style.background = '#44aaff';
        msg.style.color = 'white';
        msg.style.padding = '8px 16px';
        msg.style.borderRadius = '40px';
        msg.innerHTML = "🤝 Синхронизация...";
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 1000);
    };
    
    window.addEventListener('beforeunload', () => {
        if (sessionId && engineAPI) engineAPI.leave(sessionId);
    });
    
    startGame();
</script>
</body>
</html>
