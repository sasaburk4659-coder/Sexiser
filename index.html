<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sexiser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; min-height: 100vh; }
        header { text-align: center; padding: 50px 20px; color: white; }
        h1 { font-size: 48px; margin-bottom: 20px; }
        p { font-size: 18px; opacity: 0.9; }
        .content { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 30px; margin-top: 30px; text-align: center; color: white; }
        .navigation { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 10px 20px; border-radius: 50px; display: flex; gap: 15px; z-index: 1000; }
        .nav-btn { background: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; transition: 0.3s; }
        .nav-btn:hover { transform: scale(1.1); background: #667eea; color: white; }
        .page-indicator { color: white; display: flex; align-items: center; gap: 8px; }
        .blocked-screen { display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; background: #1a1a2e; color: white; flex-direction: column; gap: 20px; }
        .blocked-screen h1 { font-size: 72px; color: #dc3545; }
    </style>
</head>
<body id="mainBody">
    <div id="blockedScreen" style="display:none" class="blocked-screen">
        <h1>🔒 403</h1>
        <p>Доступ к сайту заблокирован</p>
        <p style="font-size:14px">Сайт заблокирован администратором</p>
    </div>
    <div id="siteContent" style="display:none">
        <div class="container">
            <header><h1 id="pageTitle">Sexiser</h1><p id="pageSubtitle" class="subtitle">Добро пожаловать!</p></header>
            <div class="content"><div id="content">Загрузка...</div></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5000';
        
        async function loadSite() {
            try {
                let res = await fetch(API + '/site');
                if(res.status === 403) {
                    document.getElementById('blockedScreen').style.display = 'flex';
                    document.getElementById('siteContent').style.display = 'none';
                    return;
                }
                let html = await res.text();
                document.getElementById('siteContent').style.display = 'block';
                document.getElementById('blockedScreen').style.display = 'none';
                
                // Извлекаем контент из HTML
                let parser = new DOMParser();
                let doc = parser.parseFromString(html, 'text/html');
                let title = doc.querySelector('title')?.innerText || 'Sexiser';
                let bodyContent = doc.body.innerHTML;
                
                document.getElementById('pageTitle').innerText = title;
                document.getElementById('content').innerHTML = bodyContent;
                
                // Применяем стили
                let styles = doc.querySelectorAll('style');
                let styleElem = document.createElement('style');
                styles.forEach(s => styleElem.innerHTML += s.innerHTML);
                document.head.appendChild(styleElem);
                
            } catch(e) {
                console.error('Error loading site:', e);
                document.getElementById('content').innerHTML = '<p>Ошибка загрузки. Убедитесь, что сервер запущен.</p>';
            }
        }
        
        loadSite();
        setInterval(loadSite, 5000);
    </script>
</body>
</html>
