<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Хостинг скриптов: публикация HTML</title>
    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e2f; color: #eee; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #topbar { background: #2a2a3a; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #ffaa00; z-index: 100; }
        #logo { font-size: 20px; font-weight: bold; color: #ffaa00; }
        #projectMenuContainer { position: relative; }
        #menuButton { background: #3a3a4a; border: none; border-radius: 30px; padding: 10px 20px; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; gap: 10px; border: 1px solid #555; }
        #projectDropdown { position: absolute; top: 50px; right: 0; background: #2a2a3a; border-radius: 10px; padding: 10px; min-width: 200px; display: none; flex-direction: column; gap: 5px; border: 1px solid #ffaa00; z-index: 200; max-height: 300px; overflow-y: auto; }
        .project-item { padding: 10px; background: #3a3a4a; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .project-item:hover { background: #4a4a5a; }
        .delete-project { color: #ff6666; font-size: 18px; padding: 0 5px; cursor: pointer; }
        #newProjectBtn { background: #ffaa00; color: #1a1a1a; border: none; border-radius: 8px; padding: 10px; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        #addButton { background: #ffaa00; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 30px; color: #1a1a1a; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-left: 15px; }
        #main { display: flex; flex: 1; overflow: hidden; flex-direction: column; }
        #editorContainer { flex: 1; display: flex; flex-direction: column; }
        #editorHeader { background: #2a2a3a; padding: 10px 15px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; border-bottom: 1px solid #444; }
        #projectName { font-size: 18px; font-weight: bold; }
        #projectType { background: #ffaa00; color: #1a1a1a; padding: 4px 12px; border-radius: 20px; font-size: 14px; }
        #runButton { background: #4caf50; border: none; color: white; padding: 8px 15px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; border: 1px solid #2e7d32; }
        #stopButton { background: #f44336; border: none; color: white; padding: 8px 15px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; border: 1px solid #d32f2f; display: none; }
        #publishButton { background: #2196f3; border: none; color: white; padding: 8px 15px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; border: 1px solid #1976d2; display: none; }
        #shareButton { background: #9c27b0; border: none; color: white; padding: 8px 15px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; border: 1px solid #7b1fa2; }
        #editor { flex: 1; overflow: auto; }
        .CodeMirror { height: 100%; font-size: 16px; }
        #outputContainer { height: 200px; display: flex; flex-direction: column; background: #1e1e2f; border-top: 1px solid #444; }
        #outputHeader { background: #2a2a3a; padding: 10px 15px; border-bottom: 1px solid #444; font-weight: bold; display: flex; justify-content: space-between; }
        #output { flex: 1; padding: 10px; overflow-y: auto; background: #1a1a2a; font-family: 'Courier New', monospace; white-space: pre-wrap; color: #0f0; font-size: 14px; }
        #htmlPreview { width: 100%; height: 100%; border: none; background: white; display: none; }
        #modalOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 300; }
        #modal { background: #2a2a3a; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; border: 2px solid #ffaa00; }
        #modal h2 { margin-top: 0; color: #ffaa00; font-size: 22px; }
        #modal input, #modal select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #3a3a4a; color: white; font-size: 16px; }
        #modal button { background: #ffaa00; color: #1a1a1a; border: none; padding: 12px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        #modal .close { background: #666; margin-top: 5px; }
        #fullscreenView { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: none; }
        #fullscreenView iframe { width: 100%; height: 100%; border: none; }
        #backButton { position: fixed; top: 10px; left: 10px; z-index: 1001; background: rgba(0,0,0,0.5); color: white; border: none; border-radius: 30px; padding: 10px 20px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <!-- Основной интерфейс -->
    <div id="topbar">
        <div id="logo">🚀 ScriptHost</div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div id="projectMenuContainer">
                <button id="menuButton">☰ <span>Проекты</span></button>
                <div id="projectDropdown">
                    <button id="newProjectBtn">➕ Новый проект</button>
                    <div id="projectList"></div>
                </div>
            </div>
            <button id="addButton" onclick="showNewProjectModal()">+</button>
        </div>
    </div>

    <div id="main">
        <!-- Редактор -->
        <div id="editorContainer">
            <div id="editorHeader">
                <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
                    <span id="projectName">Безымянный</span>
                    <span id="projectType">Python</span>
                </div>
                <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                    <button id="runButton" onclick="runCode()">▶ Запустить</button>
                    <button id="stopButton" onclick="stopCode()">⏹ Стоп</button>
                    <button id="publishButton" onclick="publishHtml()">🔗 Опубликовать сайт</button>
                    <button id="shareButton" onclick="copyShareLink()">🔗 Поделиться</button>
                </div>
            </div>
            <div id="editor"></div>
        </div>
        <!-- Вывод -->
        <div id="outputContainer">
            <div id="outputHeader">
                <span>📤 Вывод</span>
                <span id="installMsg"></span>
            </div>
            <div id="output"></div>
            <iframe id="htmlPreview"></iframe>
        </div>
    </div>

    <!-- Полноэкранный режим для опубликованного сайта -->
    <div id="fullscreenView">
        <button id="backButton" onclick="exitFullscreen()">← Назад</button>
        <iframe id="fullscreenFrame"></iframe>
    </div>

    <!-- Модальное окно нового проекта -->
    <div id="modalOverlay">
        <div id="modal">
            <h2>Новый проект</h2>
            <input type="text" id="newProjectName" placeholder="Название проекта" value="Мой проект">
            <select id="newProjectType">
                <option value="python">Python</option>
                <option value="java">Java</option>
                <option value="html">HTML</option>
            </select>
            <button onclick="createProject()">Создать</button>
            <button class="close" onclick="hideModal()">Отмена</button>
        </div>
    </div>

    <script>
        // ---------- Глобальные переменные ----------
        let editor;
        let projects = [];
        let currentProjectId = null;
        let pyWorker = null;

        // Загрузка проектов
        function loadProjects() {
            const saved = localStorage.getItem('scriptHostProjects');
            if (saved) {
                projects = JSON.parse(saved);
            } else {
                projects = [
                    { id: '1', name: 'Привет мир', type: 'python', code: 'print("Hello, World!")' },
                    { id: '2', name: 'Тест Java', type: 'java', code: 'public class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello Java");\n    }\n}' },
                    { id: '3', name: 'Моя страница', type: 'html', code: '<h1>Привет!</h1>\n<p>Это HTML.</p>' }
                ];
                saveProjects();
            }
            renderProjectList();

            // Проверяем параметр view
            const urlParams = new URLSearchParams(window.location.search);
            const viewId = urlParams.get('view');
            if (viewId) {
                const project = projects.find(p => p.id === viewId && p.type === 'html');
                if (project) {
                    showFullscreenHtml(project.code);
                } else {
                    alert('Проект не найден или не является HTML');
                }
            } else if (window.location.hash) {
                try {
                    const hashData = JSON.parse(atob(window.location.hash.slice(1)));
                    if (hashData.name && hashData.type && hashData.code) {
                        projects.push({
                            id: 'share-' + Date.now(),
                            name: hashData.name,
                            type: hashData.type,
                            code: hashData.code
                        });
                        saveProjects();
                        renderProjectList();
                        openProject(projects[projects.length-1].id);
                    }
                } catch (e) {}
            } else if (projects.length > 0) {
                openProject(projects[0].id);
            }
        }

        function saveProjects() {
            localStorage.setItem('scriptHostProjects', JSON.stringify(projects));
        }

        function renderProjectList() {
            const listDiv = document.getElementById('projectList');
            listDiv.innerHTML = '';
            projects.forEach(proj => {
                const item = document.createElement('div');
                item.className = 'project-item';
                item.innerHTML = `
                    <span onclick="openProject('${proj.id}')">${proj.name} (${proj.type})</span>
                    <span class="delete-project" onclick="deleteProject('${proj.id}')">🗑️</span>
                `;
                listDiv.appendChild(item);
            });
        }

        function openProject(id) {
            if (pyWorker) stopCode();
            const project = projects.find(p => p.id === id);
            if (!project) return;
            currentProjectId = id;
            document.getElementById('projectName').innerText = project.name;
            document.getElementById('projectType').innerText = project.type === 'python' ? 'Python' : (project.type === 'java' ? 'Java' : 'HTML');
            let mode = 'python';
            if (project.type === 'java') mode = 'text/x-java';
            else if (project.type === 'html') mode = 'htmlmixed';
            editor.setOption('mode', mode);
            editor.setValue(project.code);
            document.getElementById('output').innerHTML = '';
            document.getElementById('output').style.display = 'block';
            document.getElementById('htmlPreview').style.display = 'none';
            document.getElementById('stopButton').style.display = 'none';
            document.getElementById('runButton').style.display = 'inline-block';
            // Показываем кнопку публикации только для HTML
            if (project.type === 'html') {
                document.getElementById('publishButton').style.display = 'inline-block';
            } else {
                document.getElementById('publishButton').style.display = 'none';
            }
            document.getElementById('shareButton').style.display = 'inline-block';
            document.getElementById('projectDropdown').style.display = 'none';
        }

        function deleteProject(id) {
            if (confirm('Удалить проект?')) {
                projects = projects.filter(p => p.id !== id);
                saveProjects();
                renderProjectList();
                if (projects.length > 0) openProject(projects[0].id);
                else {
                    currentProjectId = null;
                    editor.setValue('');
                    document.getElementById('projectName').innerText = 'Нет проекта';
                }
            }
        }

        function showNewProjectModal() {
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function hideModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function createProject() {
            const name = document.getElementById('newProjectName').value.trim() || 'Новый проект';
            const type = document.getElementById('newProjectType').value;
            const id = Date.now().toString();
            let code = '';
            if (type === 'python') code = '# Напишите код на Python\nprint("Hello")';
            else if (type === 'java') code = 'public class Main {\n    public static void main(String[] args) {\n        System.out.println("Hello Java");\n    }\n}';
            else if (type === 'html') code = '<!DOCTYPE html>\n<html>\n<head>\n    <title>Моя страница</title>\n</head>\n<body>\n    <h1>Привет!</h1>\n</body>\n</html>';
            projects.push({ id, name, type, code });
            saveProjects();
            renderProjectList();
            openProject(id);
            hideModal();
        }

        // ---------- Запуск кода (Python Worker) ----------
        function runCode() {
            if (!currentProjectId) return;
            const project = projects.find(p => p.id === currentProjectId);
            if (!project) return;

            if (project.type === 'html') {
                document.getElementById('output').style.display = 'none';
                document.getElementById('htmlPreview').style.display = 'block';
                const blob = new Blob([project.code], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                document.getElementById('htmlPreview').src = url;
                return;
            } else if (project.type === 'java') {
                document.getElementById('output').style.display = 'block';
                document.getElementById('htmlPreview').style.display = 'none';
                document.getElementById('output').innerText = '⚠️ Запуск Java пока не реализован.';
                return;
            }

            // Python
            if (pyWorker) stopCode();

            document.getElementById('output').style.display = 'block';
            document.getElementById('htmlPreview').style.display = 'none';
            document.getElementById('output').innerText = '⏳ Запуск Python в фоне...\n';
            document.getElementById('runButton').style.display = 'none';
            document.getElementById('stopButton').style.display = 'inline-block';

            const workerCode = `
                self.pyodide = null;
                self.output = [];
                self.installMsg = '';

                async function init() {
                    importScripts('https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js');
                    self.pyodide = await loadPyodide();
                    self.postMessage({ type: 'ready' });
                }
                init();

                self.onmessage = async function(e) {
                    if (e.data.type === 'run') {
                        const code = e.data.code;
                        const packages = e.data.packages || [];
                        try {
                            if (packages.length > 0) {
                                self.installMsg = 'Установка модулей: ' + packages.join(', ');
                                self.postMessage({ type: 'install', msg: self.installMsg });
                                await self.pyodide.loadPackage('micropip');
                                const micropip = self.pyodide.pyimport('micropip');
                                for (let pkg of packages) {
                                    await micropip.install(pkg);
                                }
                            }
                            self.pyodide.runPython(\`
import sys
from io import StringIO
sys.stdout = StringIO()
                            \`);
                            await self.pyodide.runPythonAsync(code);
                            const result = self.pyodide.runPython('sys.stdout.getvalue()');
                            self.postMessage({ type: 'output', data: result });
                        } catch (err) {
                            self.postMessage({ type: 'error', data: err.toString() });
                        }
                    } else if (e.data.type === 'stop') {
                        self.close();
                    }
                };
            `;
            const blob = new Blob([workerCode], { type: 'application/javascript' });
            const workerUrl = URL.createObjectURL(blob);
            pyWorker = new Worker(workerUrl);

            pyWorker.onmessage = (e) => {
                if (e.data.type === 'ready') {
                    const code = project.code;
                    const packages = [];
                    if (code.includes('import telegram') || code.includes('from telegram')) packages.push('python-telegram-bot');
                    if (code.includes('import requests')) packages.push('requests');
                    if (code.includes('import numpy')) packages.push('numpy');
                    const uniquePackages = [...new Set(packages)];
                    pyWorker.postMessage({ type: 'run', code: code, packages: uniquePackages });
                } else if (e.data.type === 'output') {
                    document.getElementById('output').innerText += e.data.data;
                } else if (e.data.type === 'error') {
                    document.getElementById('output').innerText += '\\n❌ ' + e.data.data;
                } else if (e.data.type === 'install') {
                    document.getElementById('installMsg').innerText = e.data.msg;
                }
            };

            pyWorker.onerror = (err) => {
                document.getElementById('output').innerText += '\\n❌ Worker error: ' + err.message;
                stopCode();
            };
        }

        function stopCode() {
            if (pyWorker) {
                pyWorker.terminate();
                pyWorker = null;
            }
            document.getElementById('stopButton').style.display = 'none';
            document.getElementById('runButton').style.display = 'inline-block';
            document.getElementById('installMsg').innerText = '';
        }

        // ---------- Публикация HTML (отдельная ссылка) ----------
        function publishHtml() {
            if (!currentProjectId) return;
            const project = projects.find(p => p.id === currentProjectId);
            if (!project || project.type !== 'html') return;

            const url = new URL(window.location.href);
            url.searchParams.set('view', project.id);
            url.hash = ''; // убираем хэш
            const publishUrl = url.toString();

            navigator.clipboard.writeText(publishUrl).then(() => {
                alert('Ссылка на опубликованный сайт скопирована!');
            });
        }

        // Показать HTML в полноэкранном режиме
        function showFullscreenHtml(htmlCode) {
            const fullDiv = document.getElementById('fullscreenView');
            const frame = document.getElementById('fullscreenFrame');
            const blob = new Blob([htmlCode], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            frame.src = url;
            fullDiv.style.display = 'block';
        }

        function exitFullscreen() {
            document.getElementById('fullscreenView').style.display = 'none';
            document.getElementById('fullscreenFrame').src = '';
        }

        // ---------- Поделиться ссылкой на проект (для Python/Java/HTML) ----------
        function copyShareLink() {
            if (!currentProjectId) return;
            const project = projects.find(p => p.id === currentProjectId);
            if (!project) return;
            const data = {
                name: project.name,
                type: project.type,
                code: project.code
            };
            const encoded = btoa(JSON.stringify(data));
            const url = window.location.href.split('#')[0] + '#' + encoded;
            navigator.clipboard.writeText(url).then(() => {
                alert('Ссылка на проект скопирована!');
            });
        }

        // ---------- Инициализация редактора ----------
        function initEditor() {
            const editorDiv = document.getElementById('editor');
            editor = CodeMirror(editorDiv, {
                lineNumbers: true,
                theme: 'dracula',
                indentUnit: 4,
                tabSize: 4,
                lineWrapping: true,
                autoCloseBrackets: true,
                matchBrackets: true
            });
            editor.setSize('100%', '100%');
            editor.on('change', () => {
                if (currentProjectId) {
                    const project = projects.find(p => p.id === currentProjectId);
                    if (project) {
                        project.code = editor.getValue();
                        saveProjects();
                    }
                }
            });
        }

        // Меню проектов
        document.getElementById('menuButton').addEventListener('click', (e) => {
            e.stopPropagation();
            const dropdown = document.getElementById('projectDropdown');
            dropdown.style.display = dropdown.style.display === 'flex' ? 'none' : 'flex';
        });

        document.addEventListener('click', (e) => {
            const dropdown = document.getElementById('projectDropdown');
            if (!dropdown.contains(e.target) && e.target.id !== 'menuButton') {
                dropdown.style.display = 'none';
            }
        });

        window.onload = () => {
            initEditor();
            loadProjects();
        };
    </script>
</body>
</html>
