<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат с Python управлением</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .chat-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .api-info {
            background: #f8f9fa;
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .api-key-box {
            background: #2d3748;
            color: #68d391;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
            margin-top: 10px;
        }
        
        .api-url-box {
            background: #2d3748;
            color: #63b3ed;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            margin-top: 10px;
        }
        
        .copy-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
            margin-top: 10px;
        }
        
        .copy-btn:hover {
            background: #38a169;
        }
        
        .messages-area {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f7fafc;
        }
        
        .message {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease-out;
        }
        
        .message-content {
            display: inline-block;
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .sender {
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 5px;
            display: block;
            color: #667eea;
        }
        
        .timestamp {
            font-size: 10px;
            opacity: 0.7;
            margin-left: 10px;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }
        
        .input-area input:focus {
            border-color: #667eea;
        }
        
        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .status {
            padding: 10px;
            text-align: center;
            font-size: 12px;
            background: #edf2f7;
            color: #4a5568;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #48bb78;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            animation: slideInRight 0.3s ease-out;
            z-index: 1000;
        }
        
        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="chat-card">
            <div class="header">
                <h1>💬 Чат с Python управлением</h1>
                <p>Отправляйте сообщения через Python скрипт</p>
            </div>
            
            <div class="api-info">
                <strong>🔑 API Ключ (встроен в сайт):</strong>
                <div class="api-key-box" id="apiKey">
                    Загрузка...
                </div>
                
                <strong style="margin-top: 10px; display: block;">🔗 API Ссылка для Python скрипта:</strong>
                <div class="api-url-box" id="apiUrl">
                    Загрузка...
                </div>
                <button class="copy-btn" onclick="copyToClipboard('apiUrl')">📋 Копировать ссылку</button>
            </div>
            
            <div class="messages-area" id="messages">
                <div class="message">
                    <div class="message-content">
                        <span class="sender">📡 Система</span>
                        Чат активен. Ожидание сообщений от Python...
                    </div>
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Или напишите сообщение здесь..." />
                <button onclick="sendFromSite()">Отправить</button>
            </div>
            
            <div class="status" id="status">
                🟢 Онлайн | Ожидание сообщений
            </div>
        </div>
    </div>

    <script>
        // ==============================================
        // 🔑 СЛОЖНЫЙ КЛЮЧ (УЖЕ ВСТРОЕН В САЙТ)
        // ==============================================
        const SECRET_KEY = "1%&2/&)1)(2$+12+11$+1/131";
        // ==============================================
        
        // Ссылка на сайт
        const SITE_URL = window.location.href;
        
        // Отображаем ключ на странице
        document.getElementById('apiKey').textContent = SECRET_KEY;
        
        // Формируем API ссылку
        const API_URL = `${SITE_URL}?key=${encodeURIComponent(SECRET_KEY)}`;
        document.getElementById('apiUrl').textContent = API_URL;
        
        // Хранилище сообщений
        let messages = [];
        
        // Загрузка сообщений из localStorage
        function loadMessages() {
            const saved = localStorage.getItem('chat_messages');
            if (saved) {
                messages = JSON.parse(saved);
                displayMessages();
            }
        }
        
        // Сохранение сообщений
        function saveMessages() {
            localStorage.setItem('chat_messages', JSON.stringify(messages));
            displayMessages();
        }
        
        // Отображение сообщений
        function displayMessages() {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';
            
            if (messages.length === 0) {
                messagesDiv.innerHTML = '<div class="message"><div class="message-content"><span class="sender">📡 Система</span>Нет сообщений. Отправьте первое сообщение через Python!</div></div>';
                return;
            }
            
            messages.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message';
                msgDiv.innerHTML = `
                    <div class="message-content">
                        <span class="sender">${escapeHtml(msg.sender)}</span>
                        ${escapeHtml(msg.text)}
                        <span class="timestamp">${msg.timestamp || ''}</span>
                    </div>
                `;
                messagesDiv.appendChild(msgDiv);
            });
            
            // Скролл вниз
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Добавление сообщения
        function addMessage(text, sender) {
            const newMessage = {
                text: text,
                sender: sender,
                timestamp: new Date().toLocaleTimeString(),
                date: new Date().toISOString()
            };
            
            messages.push(newMessage);
            
            // Оставляем последние 100 сообщений
            if (messages.length > 100) {
                messages = messages.slice(-100);
            }
            
            saveMessages();
            
            // Показываем уведомление
            showNotification(`Новое сообщение от ${sender}`);
            
            return newMessage;
        }
        
        // Показать уведомление
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
        
        // Отправка с сайта
        function sendFromSite() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage(text, 'Сайт');
            input.value = '';
            
            // Обновляем статус
            const status = document.getElementById('status');
            status.innerHTML = '✅ Сообщение отправлено с сайта';
            status.style.background = '#c6f6d5';
            setTimeout(() => {
                status.innerHTML = '🟢 Онлайн | Ожидание сообщений';
                status.style.background = '#edf2f7';
            }, 2000);
        }
        
        // ПРОВЕРКА API ЗАПРОСОВ ОТ PYTHON
        function checkPythonRequest() {
            const urlParams = new URLSearchParams(window.location.search);
            const key = urlParams.get('key');
            const text = urlParams.get('text');
            const sender = urlParams.get('sender') || 'Python Script';
            
            // Проверяем ключ
            if (key === SECRET_KEY && text) {
                // Добавляем сообщение в чат
                addMessage(text, sender);
                
                // Обновляем статус
                const status = document.getElementById('status');
                status.innerHTML = `✅ Получено сообщение от Python: ${text.substring(0, 50)}`;
                status.style.background = '#c6f6d5';
                setTimeout(() => {
                    status.innerHTML = '🟢 Онлайн | Ожидание сообщений';
                    status.style.background = '#edf2f7';
                }, 3000);
                
                // Очищаем URL от параметров (чтобы не дублировалось при обновлении)
                window.history.replaceState({}, document.title, SITE_URL.split('?')[0]);
                
                return true;
            }
            return false;
        }
        
        // Экранирование HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Копирование в буфер обмена
        function copyToClipboard(elementId) {
            const text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text).then(() => {
                showNotification('✅ Ссылка скопирована!');
            });
        }
        
        // Очистка всех сообщений (секретная функция)
        function clearAllMessages() {
            if (confirm('Очистить все сообщения в чате?')) {
                messages = [];
                saveMessages();
                showNotification('🗑️ Все сообщения удалены');
            }
        }
        
        // Инициализация
        loadMessages();
        checkPythonRequest();
        
        // Проверяем новые сообщения каждые 2 секунды (для обновления между вкладками)
        setInterval(() => {
            const saved = localStorage.getItem('chat_messages');
            if (saved) {
                const newMessages = JSON.parse(saved);
                if (JSON.stringify(messages) !== JSON.stringify(newMessages)) {
                    messages = newMessages;
                    displayMessages();
                }
            }
        }, 2000);
        
        // Добавляем кнопку очистки (опционально)
        console.log('💬 Чат готов к работе!');
        console.log('🔑 Ключ:', SECRET_KEY);
        console.log('🔗 API URL:', API_URL);
        console.log('📝 Используйте Python скрипт для отправки сообщений');
    </script>
</body>
</html>
