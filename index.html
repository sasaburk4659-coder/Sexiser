<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packet Monitor - WebSocket Counter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            border-bottom: 2px solid #667eea;
            display: inline-block;
            padding-bottom: 5px;
        }
        
        .status-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border-left: 4px solid #dc3545;
        }
        
        .status-card.connected {
            border-left-color: #28a745;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dc3545;
            animation: pulse 1.5s infinite;
        }
        
        .status-indicator.connected {
            background: #28a745;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        .counter-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        
        .counter-label {
            font-size: 1.2em;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .counter-value {
            font-size: 4em;
            font-weight: bold;
            font-family: monospace;
            animation: countUp 0.3s ease-out;
        }
        
        @keyframes countUp {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active:not(:disabled) {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-danger {
            background: #dc3545;
        }
        
        .btn-danger:hover:not(:disabled) {
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.4);
        }
        
        .btn-success {
            background: #28a745;
        }
        
        .logs {
            background: #1e1e1e;
            border-radius: 10px;
            padding: 20px;
            color: #d4d4d4;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .logs-title {
            margin-bottom: 10px;
            color: #fff;
            font-weight: bold;
        }
        
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #333;
            font-size: 0.85em;
        }
        
        .log-entry.info {
            color: #4ec9b0;
        }
        
        .log-entry.packet {
            color: #ce9178;
        }
        
        .log-entry.error {
            color: #f48771;
        }
        
        .log-entry.welcome {
            color: #6a9955;
        }
        
        .timestamp {
            color: #858585;
            margin-right: 10px;
        }
        
        .connection-url {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9em;
            margin-top: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 Packet Monitor</h1>
        <div class="subtitle">WebSocket Packet Counter</div>
        
        <div class="status-card" id="statusCard">
            <div class="status">
                <div class="status-indicator" id="statusIndicator"></div>
                <span id="statusText">Отключено</span>
            </div>
            <div class="connection-url">
                🔌 WebSocket: <span id="wsUrl">ws://localhost:8765</span>
            </div>
        </div>
        
        <div class="counter-box">
            <div class="counter-label">📊 Получено пакетов</div>
            <div class="counter-value" id="packetCount">0</div>
        </div>
        
        <div class="buttons">
            <button id="connectBtn" class="btn-success">🔌 Подключиться</button>
            <button id="disconnectBtn" disabled>❌ Отключиться</button>
            <button id="sendPacketBtn" disabled>📨 Отправить пакет</button>
            <button id="resetBtn" disabled>🔄 Сбросить счетчик</button>
        </div>
        
        <div class="logs">
            <div class="logs-title">📝 Логи:</div>
            <div id="logContent">
                <div class="log-entry info">
                    <span class="timestamp">[СИСТЕМА]</span> Готов к работе
                </div>
                <div class="log-entry info">
                    <span class="timestamp">[СИСТЕМА]</span> Нажмите "Подключиться" для соединения с сервером
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let ws = null;
        let packetCount = 0;
        
        // DOM элементы
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const sendPacketBtn = document.getElementById('sendPacketBtn');
        const resetBtn = document.getElementById('resetBtn');
        const packetCountElement = document.getElementById('packetCount');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const statusCard = document.getElementById('statusCard');
        const logContent = document.getElementById('logContent');
        
        // Функция добавления лога
        function addLog(message, type = 'info') {
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            logEntry.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${message}`;
            logContent.appendChild(logEntry);
            logEntry.scrollIntoView({ behavior: 'smooth', block: 'end' });
            
            // Ограничиваем количество логов (оставляем последние 100)
            while (logContent.children.length > 100) {
                logContent.removeChild(logContent.firstChild);
            }
        }
        
        // Обновление счетчика
        function updateCounter(count) {
            packetCount = count;
            packetCountElement.textContent = packetCount;
            packetCountElement.style.animation = 'none';
            setTimeout(() => {
                packetCountElement.style.animation = 'countUp 0.3s ease-out';
            }, 10);
        }
        
        // Обновление статуса подключения
        function updateConnectionStatus(connected) {
            if (connected) {
                statusIndicator.classList.add('connected');
                statusCard.classList.add('connected');
                statusText.textContent = 'Подключено к серверу';
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                sendPacketBtn.disabled = false;
                resetBtn.disabled = false;
                addLog('✅ Установлено WebSocket соединение', 'info');
            } else {
                statusIndicator.classList.remove('connected');
                statusCard.classList.remove('connected');
                statusText.textContent = 'Отключено';
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                sendPacketBtn.disabled = true;
                resetBtn.disabled = true;
                if (ws) {
                    ws.close();
                    ws = null;
                }
                addLog('🔌 WebSocket соединение закрыто', 'info');
            }
        }
        
        // Обработка входящих сообщений
        function handleMessage(data) {
            console.log('Получено сообщение:', data);
            
            switch(data.type) {
                case 'welcome':
                    addLog(`👋 ${data.message}. Текущий счетчик: ${data.count}`, 'welcome');
                    updateCounter(data.count);
                    break;
                    
                case 'packet':
                    addLog(`📦 ${data.message} (время: ${new Date(data.timestamp).toLocaleTimeString()})`, 'packet');
                    updateCounter(data.count);
                    break;
                    
                case 'reset':
                    addLog(`🔄 ${data.message}`, 'info');
                    updateCounter(0);
                    break;
                    
                default:
                    addLog(`ℹ️ Получено неизвестное сообщение: ${JSON.stringify(data)}`, 'info');
            }
        }
        
        // Подключение к WebSocket
        function connect() {
            const wsUrl = 'ws://localhost:8765';
            
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    updateConnectionStatus(true);
                };
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        handleMessage(data);
                    } catch (e) {
                        addLog(`⚠️ Ошибка парсинга сообщения: ${event.data}`, 'error');
                    }
                };
                
                ws.onerror = (error) => {
                    addLog(`❌ WebSocket ошибка: ${error.message || 'Неизвестная ошибка'}`, 'error');
                    console.error('WebSocket error:', error);
                };
                
                ws.onclose = () => {
                    updateConnectionStatus(false);
                };
                
            } catch (error) {
                addLog(`❌ Ошибка подключения: ${error.message}`, 'error');
            }
        }
        
        // Отключение
        function disconnect() {
            if (ws) {
                ws.close();
            }
        }
        
        // Отправка команды на сервер
        function sendCommand(command) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const message = JSON.stringify({ command: command });
                ws.send(message);
                addLog(`📤 Отправлена команда: ${command}`, 'info');
            } else {
                addLog(`⚠️ Нет соединения с сервером. Команда "${command}" не отправлена`, 'error');
            }
        }
        
        // Обработчики событий
        connectBtn.addEventListener('click', connect);
        disconnectBtn.addEventListener('click', disconnect);
        sendPacketBtn.addEventListener('click', () => sendCommand('send_packet'));
        resetBtn.addEventListener('click', () => sendCommand('reset'));
        
        // Автоматическое обновление статуса при загрузке
        addLog('💡 Для работы требуется запустить Python сервер (websocket_server.py)', 'info');
        addLog('💡 Сервер должен быть доступен по адресу ws://localhost:8765', 'info');
    </script>
</body>
</html>
