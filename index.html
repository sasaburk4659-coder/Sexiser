<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Manager - WebSocket Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: monospace;
            background: #0a0a0a;
            color: #0f0;
            padding: 20px;
        }
        .status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
        }
        .connected { background: #0a0; color: #fff; }
        .disconnected { background: #a00; color: #fff; }
        .connecting { background: #fa0; color: #000; }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin: 10px 0;
        }
        button {
            background: #0a0;
            color: #000;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }
        button:hover { opacity: 0.8; }
        .log {
            background: #000;
            border: 1px solid #333;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            font-size: 12px;
        }
        .log-entry {
            border-bottom: 1px solid #333;
            padding: 5px;
            font-family: monospace;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #000;
            border: 1px solid #333;
            color: #0f0;
            font-family: monospace;
        }
        .ws-url {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 11px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="status disconnected" id="status">🔌 WebSocket: ОТКЛЮЧЕН</div>
    <div class="ws-url" id="ws-url">ws://localhost:8765</div>
    
    <div class="container">
        <div class="card">
            <h2>🎬 YouTube Stream Manager</h2>
            <p>WebSocket тест - проверка связи с Python сервером</p>
        </div>
        
        <div class="card">
            <h3>🔌 WebSocket настройки</h3>
            <input type="text" id="ws-input" value="ws://localhost:8765" placeholder="WebSocket URL">
            <button onclick="connectWebSocket()">🔌 Подключиться</button>
            <button onclick="disconnectWebSocket()">❌ Отключиться</button>
            <button onclick="testConnection()">📡 Проверить</button>
        </div>
        
        <div class="card">
            <h3>🎮 Команды</h3>
            <button onclick="sendCommand('start')">▶️ СТАРТ</button>
            <button onclick="sendCommand('stop')">⏹️ СТОП</button>
            <button onclick="sendCommand('status')">📊 СТАТУС</button>
            <button onclick="sendCommand('notify')">🔔 УВЕДОМЛЕНИЕ</button>
        </div>
        
        <div class="card">
            <h3>📹 Видео</h3>
            <input type="file" id="video-file" accept="video/*" onchange="uploadVideo(this)">
            <div id="video-list"></div>
        </div>
        
        <div class="card">
            <h3>📝 Логи</h3>
            <div class="log" id="logs">
                <div class="log-entry">[SYSTEM] Готов к работе</div>
            </div>
            <button onclick="clearLogs()">🗑️ Очистить</button>
        </div>
    </div>
    
    <script>
        let ws = null;
        let videos = [];
        
        function addLog(message, type = 'info') {
            const logs = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            const colors = { info: '#0f0', error: '#f00', success: '#0f0', warning: '#fa0' };
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.style.color = colors[type] || '#0f0';
            entry.innerHTML = `[${time}] ${message}`;
            logs.appendChild(entry);
            logs.scrollTop = logs.scrollHeight;
            
            // Отправляем лог на сервер если подключены
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'log',
                    level: type,
                    message: message
                }));
            }
        }
        
        function updateStatus(connected) {
            const statusDiv = document.getElementById('status');
            if (connected) {
                statusDiv.className = 'status connected';
                statusDiv.innerHTML = '✅ WebSocket: ПОДКЛЮЧЕН';
                addLog('✅ WebSocket подключен!', 'success');
            } else {
                statusDiv.className = 'status disconnected';
                statusDiv.innerHTML = '🔌 WebSocket: ОТКЛЮЧЕН';
                addLog('❌ WebSocket отключен', 'error');
            }
        }
        
        function connectWebSocket() {
            const url = document.getElementById('ws-input').value;
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                addLog('⚠️ Уже подключен', 'warning');
                return;
            }
            
            addLog(`🔌 Подключение к ${url}...`, 'info');
            updateStatus(false);
            
            try {
                ws = new WebSocket(url);
                
                ws.onopen = () => {
                    addLog('✅ WebSocket соединение установлено!', 'success');
                    updateStatus(true);
                    
                    // Регистрируемся как сайт
                    ws.send(JSON.stringify({
                        type: 'register',
                        client: 'website',
                        timestamp: new Date().toISOString()
                    }));
                    
                    // Отправляем список видео
                    sendVideoList();
                };
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        addLog(`📨 Получено: ${data.type || 'unknown'}`, 'info');
                        
                        switch(data.type) {
                            case 'command':
                                addLog(`🎮 Выполнение команды: ${data.command}`, 'success');
                                executeCommand(data.command, data.params);
                                break;
                                
                            case 'upload_video':
                                addLog(`📹 Получено видео от сервера: ${data.video_name}`, 'success');
                                addVideoFromBase64(data.video_name, data.video_data);
                                break;
                                
                            case 'notification':
                                addLog(`🔔 ${data.message}`, 'info');
                                alert(data.message);
                                break;
                                
                            case 'pong':
                                addLog('🏓 Pong получен', 'info');
                                break;
                                
                            case 'connected':
                                addLog(`✅ ${data.message}`, 'success');
                                break;
                                
                            case 'registered':
                                addLog(`✅ ${data.message}`, 'success');
                                break;
                                
                            default:
                                addLog(`📦 Неизвестный тип: ${data.type}`, 'warning');
                        }
                    } catch(e) {
                        addLog(`❌ Ошибка парсинга: ${e}`, 'error');
                    }
                };
                
                ws.onerror = (error) => {
                    addLog(`❌ WebSocket ошибка: ${error}`, 'error');
                    updateStatus(false);
                };
                
                ws.onclose = () => {
                    addLog('🔌 WebSocket закрыт', 'warning');
                    updateStatus(false);
                    
                    // Автоматическое переподключение через 5 секунд
                    setTimeout(() => {
                        if (!ws || ws.readyState !== WebSocket.OPEN) {
                            addLog('🔄 Попытка переподключения...', 'info');
                            connectWebSocket();
                        }
                    }, 5000);
                };
                
            } catch(e) {
                addLog(`❌ Ошибка подключения: ${e}`, 'error');
            }
        }
        
        function disconnectWebSocket() {
            if (ws) {
                ws.close();
                ws = null;
                addLog('🔌 Отключение по запросу', 'warning');
            }
        }
        
        function testConnection() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'ping' }));
                addLog('📡 Отправлен ping', 'info');
            } else {
                addLog('❌ Нет подключения', 'error');
                connectWebSocket();
            }
        }
        
        function sendCommand(command, params = {}) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addLog(`❌ Нет подключения, команда "${command}" не отправлена`, 'error');
                connectWebSocket();
                return;
            }
            
            const message = {
                type: 'command',
                command: command,
                params: params,
                timestamp: new Date().toISOString()
            };
            
            ws.send(JSON.stringify(message));
            addLog(`📤 Отправлена команда: ${command}`, 'info');
        }
        
        function executeCommand(command, params) {
            switch(command) {
                case 'start':
                    startStream();
                    break;
                case 'stop':
                    stopStream();
                    break;
                case 'status':
                    sendStatus();
                    break;
                case 'notify':
                    addLog('🔔 Уведомление отправлено', 'success');
                    alert('🔔 Уведомление отправлено!');
                    break;
                default:
                    addLog(`⚠️ Неизвестная команда: ${command}`, 'warning');
            }
        }
        
        function startStream() {
            addLog('🎬 Запуск стрима...', 'success');
            if (ws) {
                ws.send(JSON.stringify({
                    type: 'stream_started',
                    title: document.getElementById('stream-title')?.value || 'Stream'
                }));
            }
        }
        
        function stopStream() {
            addLog('⏹️ Остановка стрима...', 'warning');
            if (ws) {
                ws.send(JSON.stringify({ type: 'stream_stopped' }));
            }
        }
        
        function sendStatus() {
            const status = {
                type: 'status_response',
                is_live: false,
                videos_count: videos.length,
                timestamp: new Date().toISOString()
            };
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(status));
            }
            addLog(`📊 Статус отправлен: видео=${videos.length}`, 'info');
        }
        
        function sendVideoList() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'videos_list',
                    videos: videos.map(v => ({ name: v.name, size: v.size }))
                }));
            }
        }
        
        function uploadVideo(input) {
            const file = input.files[0];
            if (!file) return;
            
            addLog(`📹 Загрузка: ${file.name} (${(file.size/1024/1024).toFixed(2)} MB)`, 'info');
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const videoData = {
                    id: Date.now(),
                    name: file.name,
                    data: e.target.result,
                    size: file.size
                };
                videos.push(videoData);
                updateVideoList();
                
                addLog(`✅ Видео загружено: ${file.name}`, 'success');
                
                // Отправляем на сервер
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'video_uploaded',
                        video_name: file.name,
                        video_size: file.size
                    }));
                    sendVideoList();
                }
            };
            reader.readAsDataURL(file);
        }
        
        function addVideoFromBase64(name, base64Data) {
            videos.push({
                id: Date.now(),
                name: name,
                data: base64Data,
                size: Math.round(base64Data.length * 0.75)
            });
            updateVideoList();
            addLog(`✅ Видео получено от сервера: ${name}`, 'success');
        }
        
        function updateVideoList() {
            const container = document.getElementById('video-list');
            if (videos.length === 0) {
                container.innerHTML = '<div style="color: #666; padding: 20px; text-align: center;">Нет видео</div>';
                return;
            }
            
            container.innerHTML = videos.map(v => `
                <div style="background: #000; padding: 10px; margin: 5px 0; border-radius: 5px;">
                    <span>📹 ${v.name} (${(v.size/1024/1024).toFixed(2)} MB)</span>
                    <button onclick="deleteVideo(${v.id})" style="float: right; background: #a00; padding: 2px 10px;">🗑️</button>
                </div>
            `).join('');
        }
        
        function deleteVideo(id) {
            videos = videos.filter(v => v.id !== id);
            updateVideoList();
            addLog(`🗑️ Видео удалено`, 'warning');
            sendVideoList();
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '<div class="log-entry">[SYSTEM] Логи очищены</div>';
        }
        
        // Автоподключение при загрузке
        setTimeout(() => {
            connectWebSocket();
        }, 1000);
        
        // Периодическая проверка соединения
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                testConnection();
            } else if (ws && ws.readyState === WebSocket.CLOSED) {
                connectWebSocket();
            }
        }, 30000);
    </script>
</body>
</html>
