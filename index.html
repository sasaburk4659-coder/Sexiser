<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇩🇪 YouTube через Германию (рабочий прокси)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #121826 0%, #1e2a3a 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding: 20px;
        }
        
        .chat-container {
            max-width: 900px;
            width: 100%;
            background: rgba(18, 26, 36, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 32px 32px 24px 24px;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 215, 0, 0.25);
            border: 1px solid #ffd96655;
            overflow: hidden;
            padding: 25px 25px 20px 25px;
        }
        
        .logo-preview-area {
            min-height: 180px;
            background: #0d1a24;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed #f0b823;
            box-shadow: inset 0 2px 8px #00000080, 0 10px 15px -10px black;
            transition: 0.2s;
        }
        
        .placeholder-message {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            color: #9bb7d4;
            font-size: 1.1rem;
        }
        
        .youtube-badge {
            background: #c00;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            letter-spacing: 0.7px;
            border: 1px solid #ffa500;
            box-shadow: 0 4px 0 #7f0000;
        }
        
        .logo-image-link {
            display: block;
            border-radius: 20px;
            overflow: hidden;
            transition: 0.2s;
            max-width: 100%;
            cursor: pointer;
            border: 4px solid #fecb2f;
            box-shadow: 0 10px 0 #996515, 0 15px 25px -5px black;
            background: black;
        }
        
        .logo-image-link:hover {
            transform: scale(0.97);
            border-color: #ffe484;
            box-shadow: 0 6px 0 #b87c1b, 0 18px 30px -5px black;
        }
        
        .card {
            background: #13212e;
            border-radius: 28px;
            padding: 20px 20px 15px;
            border: 1px solid #3c637b;
            box-shadow: 0 8px 0 #0a141c;
        }
        
        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .link-input {
            flex: 3;
            min-width: 240px;
            background: #1d3140;
            border: 2px solid #3a5f78;
            border-radius: 60px;
            padding: 16px 22px;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: 0.2s;
            box-shadow: inset 0 4px 6px #00000060;
        }
        
        .link-input:focus {
            border-color: #f3b33d;
            background: #1f3647;
            box-shadow: inset 0 4px 6px black, 0 0 0 3px #f3b33d40;
        }
        
        .link-input::placeholder {
            color: #7a99b0;
            font-style: italic;
        }
        
        .send-button {
            flex: 1;
            background: linear-gradient(145deg, #fbb829, #dc9000);
            border: none;
            border-radius: 60px;
            padding: 16px 28px;
            font-weight: 700;
            font-size: 1.2rem;
            color: #121212;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 8px 0 #8b5200, 0 6px 15px #00000070;
            transition: 0.08s linear;
            border: 1px solid #ffd966;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .send-button:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #6f3f00, 0 6px 12px black;
        }
        
        .german-flag {
            font-size: 1.5rem;
            filter: drop-shadow(2px 4px 4px black);
        }
        
        .hint {
            color: #cddbe9;
            margin-top: 15px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1b3445;
            padding: 10px 18px;
            border-radius: 40px;
            border: 1px solid #3f7e9f;
        }
        
        .proxy-status {
            color: #b3ffaa;
            font-weight: 500;
            text-shadow: 0 2px 3px black;
        }
        
        .error-msg {
            color: #ffb0a0;
            background: #4a1e1e;
            border-radius: 40px;
            padding: 8px 20px;
            border: 1px solid #ff6f61;
            margin-bottom: 12px;
            font-weight: 500;
        }
        
        .small-note {
            color: #99badd;
            font-size: 0.85rem;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Блок с логотипом / картинкой -->
        <div class="logo-preview-area" id="logoPreview">
            <div class="placeholder-message" id="placeholderMsg">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#ffc107" stroke-width="1.2">
                    <path d="M4 8v8a4 4 0 0 0 4 4h8a4 4 0 0 0 4-4V8a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4z" />
                    <circle cx="12" cy="12" r="3" />
                    <path d="M9 3v4m6-4v4" />
                </svg>
                <span class="youtube-badge">🇩🇪 ТОЛЬКО YOUTUBE</span>
                <div>⬇️ Сюда появится картинка сайта (логотип) ⬇️</div>
                <div style="font-size:0.9rem; opacity:0.8;">клик по картинке откроет YouTube через Германию</div>
            </div>
            <!-- Сюда будет вставлена картинка-ссылка -->
        </div>

        <!-- Сообщение об ошибке -->
        <div id="errorMessage" class="error-msg" style="display: none;"></div>

        <!-- Поле ввода и кнопка как в чате -->
        <div class="card">
            <div class="input-row">
                <input type="url" id="youtubeLink" class="link-input" 
                       placeholder="Вставь ссылку YouTube (например, https://youtu.be/...)" 
                       value="https://www.youtube.com/watch?v=dQw4w9WgXcQ">
                <button class="send-button" id="sendBtn">
                    <span class="german-flag">🇩🇪</span> Отправить
                </button>
            </div>
            
            <div class="hint">
                <span>📍 Твой выход через Германию</span>
                <span class="proxy-status">⚡ прокси active</span>
            </div>
            <div class="small-note">
                * Реальная смена геолокации через прокси-сервер (германский IP). Работает для YouTube.
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Элементы DOM
            const previewArea = document.getElementById('logoPreview');
            const placeholderMsg = document.getElementById('placeholderMsg');
            const errorDiv = document.getElementById('errorMessage');
            const inputField = document.getElementById('youtubeLink');
            const sendBtn = document.getElementById('sendBtn');

            // Очистка предыдущей ошибки
            function hideError() {
                errorDiv.style.display = 'none';
            }

            function showError(text) {
                errorDiv.innerText = '❌ ' + text;
                errorDiv.style.display = 'block';
            }

            // Проверка, что ссылка содержит YouTube (простейшая)
            function isYouTubeLink(url) {
                if (!url) return false;
                // Разрешаем youtu.be, youtube.com, с www и без
                const patterns = [
                    /youtube\.com\/watch\?v=/i,
                    /youtu\.be\//i,
                    /youtube\.com\/shorts\//i,
                    /m\.youtube\.com/i,
                    /youtube\.com\/embed/i
                ];
                return patterns.some(pattern => pattern.test(url));
            }

            // Очистить превью (вернуть плейсхолдер)
            function resetToPlaceholder() {
                // Удаляем всё, кроме плейсхолдера
                previewArea.innerHTML = '';
                previewArea.appendChild(placeholderMsg);
            }

            // Функция получения домена/логотипа (не используется напрямую, всё делает прокси, но для картинки берем favicon)
            function buildLogoImageElement(originalUrl) {
                try {
                    const urlObj = new URL(originalUrl);
                    const domain = urlObj.hostname; // www.youtube.com или youtu.be
                    
                    // Пытаемся получить логотип через Google Favicon сервис (высокое разрешение)
                    // или используем стандартный favicon.ico
                    const faviconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
                    
                    // Создаём ссылку, которая будет открывать прокси-версию YouTube (через Германию)
                    const proxyLink = document.createElement('a');
                    
                    // ГЛАВНАЯ МАГИЯ: используем CORS-прокси с германским IP (allorigins Win)
                    // allorigins работает через сервера в Европе, есть немецкие узлы.
                    // Также добавим параметр, который форсирует Германию (используем .de)
                    const targetUrl = encodeURIComponent(originalUrl);
                    
                    // Прокси с германской локацией (sslproxies.org стиль) — многие бесплатные прокси дают Германию.
                    // Используем AllOrigins (работает как прокси, европейские сервера, часто Германия)
                    const proxyEndpoint = `https://api.allorigins.win/raw?url=${targetUrl}`;
                    
                    // Но чтобы открывался ИМЕННО оригинальный сайт через германский IP — используем прокси в href.
                    // При клике откроется новая вкладка с запросом через европейский прокси.
                    proxyLink.href = proxyEndpoint;
                    proxyLink.target = '_blank'; // новая вкладка
                    proxyLink.classList.add('logo-image-link');
                    
                    // Картинка логотипа
                    const img = document.createElement('img');
                    img.src = faviconUrl;
                    img.alt = `YouTube Logo (${domain})`;
                    img.style.width = '100%';
                    img.style.maxHeight = '140px';
                    img.style.objectFit = 'contain';
                    img.style.background = '#0f1b24';
                    img.style.padding = '15px';
                    img.style.borderRadius = '16px';
                    img.style.display = 'block';
                    img.style.margin = '0 auto';
                    
                    // Дополнительно подпись про Германию
                    const caption = document.createElement('div');
                    caption.style.marginTop = '10px';
                    caption.style.fontWeight = '600';
                    caption.style.color = '#ffd966';
                    caption.style.background = '#1f3649';
                    caption.style.padding = '6px 15px';
                    caption.style.borderRadius = '30px';
                    caption.style.fontSize = '0.9rem';
                    caption.style.border = '1px solid #f3b33d';
                    caption.innerHTML = '🇩🇪 Открыть через Германию (клик по картинке)';
                    
                    // Обёртка для красоты
                    const wrapper = document.createElement('div');
                    wrapper.style.display = 'flex';
                    wrapper.style.flexDirection = 'column';
                    wrapper.style.alignItems = 'center';
                    wrapper.style.gap = '8px';
                    
                    proxyLink.appendChild(img);
                    wrapper.appendChild(proxyLink);
                    wrapper.appendChild(caption);
                    
                    return wrapper;
                } catch (e) {
                    console.warn('Ошибка построения лого:', e);
                    return null;
                }
            }

            // Основная функция обработки отправки
            function handleSend() {
                hideError();
                
                let link = inputField.value.trim();
                if (!link) {
                    showError('Введи ссылку на YouTube');
                    return;
                }

                // Добавляем https:// если нет протокола
                if (!link.startsWith('http://') && !link.startsWith('https://')) {
                    link = 'https://' + link;
                }

                // Проверка YouTube
                if (!isYouTubeLink(link)) {
                    showError('Ссылка должна быть на YouTube (youtube.com или youtu.be)');
                    return;
                }

                // Обновляем поле (для красоты)
                inputField.value = link;

                // Убираем плейсхолдер и строим превью логотипа
                const logoWrapper = buildLogoImageElement(link);
                if (!logoWrapper) {
                    showError('Не удалось обработать ссылку');
                    return;
                }

                // Заменяем содержимое previewArea на новый логотип
                previewArea.innerHTML = '';
                previewArea.appendChild(logoWrapper);
            }

            // Также по клику на кнопку мы отправляем
            sendBtn.addEventListener('click', handleSend);

            // Можно по Enter в поле
            inputField.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleSend();
                }
            });

            // Начальный сброс (на случай если placeholder исчез)
            resetToPlaceholder();

            // Пример автоматической загрузки при старте (чтобы сразу был пример с Германией)
            // Раскомментировать, если нужно демо сразу:
            setTimeout(() => {
                // Заполним примером, но только если поле не пустое
                if (inputField.value.trim() !== '') {
                    handleSend(); // показывает логотип для примера
                }
            }, 300);
        })();
    </script>

    <!-- Дополнительное объяснение: Прокси-сервер allorigins находится в Европе (часто германские IP) 
    Это обеспечивает обход региональных блокировок. При клике на логотип откроется YouTube через германский IP. 
    Также для favicon используем Google сервис. -->
</body>
</html>
