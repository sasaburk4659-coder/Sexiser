<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sexiser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            position: relative;
            transition: all 0.3s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 50px 20px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            animation: fadeInDown 0.8s ease;
        }

        .subtitle {
            font-size: 18px;
            opacity: 0.9;
            animation: fadeInUp 0.8s ease;
        }

        .content {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            min-height: 400px;
            position: relative;
        }

        .objects-container {
            position: relative;
            min-height: 300px;
        }

        .page-object {
            position: absolute;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .page-object:hover {
            transform: scale(1.05);
        }

        .navigation {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            gap: 15px;
            z-index: 1000;
        }

        .nav-btn {
            background: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            transform: scale(1.1);
            background: #667eea;
            color: white;
        }

        .page-indicator {
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .page-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            border: none;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .page-dot.active {
            background: white;
            color: #667eea;
            transform: scale(1.2);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInLeft {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .transition-left {
            animation: slideInLeft 0.5s ease-out;
        }

        .transition-right {
            animation: slideInRight 0.5s ease-out;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
        }
    </style>
</head>
<body id="mainBody">
    <div class="container">
        <header>
            <h1 id="pageTitle">Sexiser</h1>
            <p id="pageSubtitle" class="subtitle">Добро пожаловать!</p>
        </header>
        
        <div class="content">
            <div class="objects-container" id="objectsContainer">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <div class="navigation">
        <button class="nav-btn" onclick="changePage('prev')">◀</button>
        <div class="page-indicator" id="pageIndicator">
            <span id="currentPageNum">1</span> / <span id="totalPagesNum">1</span>
        </div>
        <button class="nav-btn" onclick="changePage('next')">▶</button>
    </div>

    <script>
        let currentPageIndex = 0;
        let totalPages = 1;
        let pagesData = [];
        let currentObjects = [];
        let isTransitioning = false;

        // Адрес вашего Python сервера (измените если нужно)
        const API_URL = 'http://localhost:5000';

        function loadSiteData() {
            fetch(`${API_URL}/api/site/data`)
                .then(response => response.json())
                .then(data => {
                    // Применяем настройки
                    if (data.settings) {
                        document.getElementById('pageTitle').textContent = data.settings.title || 'Sexiser';
                        document.getElementById('pageSubtitle').textContent = data.settings.subtitle || 'Добро пожаловать!';
                        if (data.settings.bg_color) {
                            document.getElementById('mainBody').style.background = data.settings.bg_color;
                        }
                    }
                    
                    pagesData = data.pages;
                    totalPages = pagesData.length;
                    currentPageIndex = data.current_page;
                    
                    document.getElementById('currentPageNum').textContent = currentPageIndex + 1;
                    document.getElementById('totalPagesNum').textContent = totalPages;
                    
                    renderObjects(data.objects);
                })
                .catch(error => {
                    console.log('Редактор не запущен, показываем статическую версию');
                    document.getElementById('objectsContainer').innerHTML = '<div class="loading">✨ Добро пожаловать на сайт! ✨</div>';
                });
        }

        function renderObjects(objects) {
            const container = document.getElementById('objectsContainer');
            container.innerHTML = '';
            
            if (objects.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: white; padding: 50px;">✨ Здесь будут ваши картинки и текст ✨</div>';
                return;
            }
            
            objects.forEach(obj => {
                if (obj.type === 'image') {
                    const div = document.createElement('div');
                    div.className = 'page-object';
                    div.style.left = (obj.data.x || 50) + 'px';
                    div.style.top = (obj.data.y || 50) + 'px';
                    div.innerHTML = `<img src="${API_URL}${obj.data.src}" style="width: ${obj.data.width || 200}px; border-radius: ${obj.data.border_radius || 10}px;">`;
                    container.appendChild(div);
                } else if (obj.type === 'text') {
                    const div = document.createElement('div');
                    div.className = 'page-object';
                    div.style.left = (obj.data.x || 50) + 'px';
                    div.style.top = (obj.data.y || 100) + 'px';
                    div.innerHTML = `<div style="font-size: ${obj.data.font_size || 16}px; color: ${obj.data.color || '#ffffff'}; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px;">
                        ${obj.data.text}
                    </div>`;
                    container.appendChild(div);
                }
            });
        }

        function changePage(direction) {
            if (isTransitioning) return;
            isTransitioning = true;
            
            const container = document.getElementById('objectsContainer');
            const animationClass = direction === 'next' ? 'transition-left' : 'transition-right';
            
            container.classList.add(animationClass);
            
            setTimeout(() => {
                if (direction === 'next') {
                    currentPageIndex = (currentPageIndex + 1) % totalPages;
                } else {
                    currentPageIndex = (currentPageIndex - 1 + totalPages) % totalPages;
                }
                
                document.getElementById('currentPageNum').textContent = currentPageIndex + 1;
                
                fetch(`${API_URL}/api/site/data`)
                    .then(response => response.json())
                    .then(data => {
                        renderObjects(data.objects);
                        setTimeout(() => {
                            container.classList.remove(animationClass);
                            isTransitioning = false;
                        }, 100);
                    });
            }, 200);
        }

        // Загружаем данные каждые 3 секунды (чтобы видеть изменения от редактора)
        loadSiteData();
        setInterval(loadSiteData, 3000);
    </script>
</body>
</html>
