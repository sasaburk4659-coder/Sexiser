<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор сайта - Sexiser</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #fff;
            overflow: hidden;
        }

        /* Верхняя панель */
        .top-bar {
            background: #2d2d2d;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3d3d3d;
        }

        .page-navigation {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #3d3d3d;
            padding: 8px 20px;
            border-radius: 50px;
        }

        .nav-arrow {
            background: #007acc;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            color: white;
            transition: all 0.3s;
        }

        .nav-arrow:hover {
            transform: scale(1.1);
            background: #005a9e;
        }

        .page-counter {
            font-size: 18px;
            font-weight: bold;
            min-width: 100px;
            text-align: center;
        }

        .page-name {
            font-size: 20px;
            font-weight: bold;
            color: #007acc;
        }

        /* Основной контейнер */
        .main-container {
            display: flex;
            height: calc(100vh - 70px);
        }

        /* Боковая панель инструментов */
        .sidebar {
            width: 350px;
            background: #252526;
            border-right: 1px solid #3d3d3d;
            overflow-y: auto;
            padding: 20px;
        }

        .section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #3d3d3d;
        }

        .section h3 {
            color: #007acc;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .tool-btn {
            background: #007acc;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin: 5px 0;
            transition: all 0.3s;
        }

        .tool-btn:hover {
            background: #005a9e;
            transform: translateY(-2px);
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            background: #3d3d3d;
            border: 1px solid #4d4d4d;
            color: white;
            border-radius: 3px;
        }

        .object-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .object-item {
            background: #2d2d2d;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .object-item:hover {
            background: #3d3d3d;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }

        /* Область превью */
        .preview-area {
            flex: 1;
            background: white;
            position: relative;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            transition: all 0.3s;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #2d2d2d;
            padding: 30px;
            border-radius: 10px;
            min-width: 400px;
        }

        /* Анимация для страниц */
        @keyframes pageFlip {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .iframe-flip {
            animation: pageFlip 0.6s ease-out;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="page-navigation">
            <button class="nav-arrow" onclick="changePage('prev')">◀</button>
            <div class="page-counter">
                <span id="currentPageNum">1</span> / <span id="totalPagesNum">1</span>
            </div>
            <button class="nav-arrow" onclick="changePage('next')">▶</button>
        </div>
        <div class="page-name" id="pageName">Главная</div>
        <button class="tool-btn" style="width: auto;" onclick="showAddPageModal()">➕ Новая страница</button>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div class="section">
                <h3>📷 Добавить изображение</h3>
                <input type="file" id="imageUpload" accept="image/*">
                <button class="tool-btn" onclick="uploadImage()">Загрузить</button>
            </div>

            <div class="section">
                <h3>📝 Добавить текст</h3>
                <textarea id="textContent" rows="3" placeholder="Введите текст..."></textarea>
                <button class="tool-btn" onclick="addText()">Добавить текст</button>
            </div>

            <div class="section">
                <h3>🎨 Объекты на странице</h3>
                <div class="object-list" id="objectList">
                    <div style="color: #888; text-align: center;">Нет объектов</div>
                </div>
            </div>
        </div>

        <div class="preview-area">
            <iframe id="previewFrame" src="/preview/home"></iframe>
        </div>
    </div>

    <!-- Модальное окно для создания страницы -->
    <div id="pageModal" class="modal">
        <div class="modal-content">
            <h2>➕ Новая страница</h2>
            <input type="text" id="pageNameInput" placeholder="Название страницы">
            <input type="password" id="pagePassword" placeholder="Пароль (оставьте пустым для открытой страницы)">
            <div class="modal-buttons" style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="tool-btn" onclick="createPage()">Создать</button>
                <button class="tool-btn" style="background: #6c757d;" onclick="closeModal()">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentPageIndex = 0;
        let totalPages = 0;
        let currentObjects = [];

        // Загрузка информации
        function loadSiteInfo() {
            fetch('/api/site/info')
                .then(res => res.json())
                .then(data => {
                    currentPageIndex = data.current_page_index;
                    totalPages = data.pages.length;
                    document.getElementById('currentPageNum').textContent = currentPageIndex + 1;
                    document.getElementById('totalPagesNum').textContent = totalPages;
                    document.getElementById('pageName').textContent = data.current_page.name;
                    updateObjectsList(data.objects);
                    updatePreview(data.current_page.id);
                });
        }

        function updateObjectsList(objects) {
            currentObjects = objects;
            const container = document.getElementById('objectList');
            if (objects.length === 0) {
                container.innerHTML = '<div style="color: #888; text-align: center;">Нет объектов</div>';
                return;
            }
            
            container.innerHTML = objects.map(obj => `
                <div class="object-item" onclick="editObject('${obj.id}')">
                    <span>${obj.type === 'image' ? '🖼️ Изображение' : '📝 Текст'}</span>
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteObject('${obj.id}')">🗑️</button>
                </div>
            `).join('');
        }

        function updatePreview(pageId) {
            const iframe = document.getElementById('previewFrame');
            iframe.style.animation = 'none';
            iframe.offsetHeight;
            iframe.style.animation = 'pageFlip 0.6s ease-out';
            iframe.src = `/preview/${pageId}`;
        }

        function changePage(direction) {
            fetch('/api/site/switch_page', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({direction: direction})
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    currentPageIndex = data.new_index;
                    document.getElementById('currentPageNum').textContent = currentPageIndex + 1;
                    document.getElementById('pageName').textContent = data.page.name;
                    updatePreview(data.page.id);
                    loadSiteInfo();
                }
            });
        }

        function uploadImage() {
            const file = document.getElementById('imageUpload').files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('image', file);
            
            fetch('/api/object/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    type: 'image',
                    data: {
                        src: URL.createObjectURL(file),
                        x: 50,
                        y: 50,
                        width: 200,
                        border_radius: 10
                    }
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('✅ Изображение добавлено!');
                    loadSiteInfo();
                }
            });
        }

        function addText() {
            const text = document.getElementById('textContent').value;
            if (!text) return;
            
            fetch('/api/object/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    type: 'text',
                    data: {
                        text: text,
                        x: 50,
                        y: 100,
                        font_size: 16,
                        color: '#000000'
                    }
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('✅ Текст добавлен!');
                    document.getElementById('textContent').value = '';
                    loadSiteInfo();
                }
            });
        }

        function deleteObject(objId) {
            if (confirm('Удалить этот объект?')) {
                fetch(`/api/object/delete/${objId}`, {method: 'DELETE'})
                    .then(() => loadSiteInfo());
            }
        }

        function showAddPageModal() {
            document.getElementById('pageModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('pageModal').style.display = 'none';
        }

        function createPage() {
            const name = document.getElementById('pageNameInput').value;
            const password = document.getElementById('pagePassword').value;
            
            if (!name) {
                alert('Введите название страницы');
                return;
            }
            
            fetch('/api/page/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: name, password: password || null})
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert(`✅ Страница "${name}" создана!`);
                    closeModal();
                    loadSiteInfo();
                }
            });
        }

        // WebSocket события
        socket.on('object_added', (data) => {
            loadSiteInfo();
        });
        
        socket.on('page_added', (data) => {
            loadSiteInfo();
        });

        // Запуск
        loadSiteInfo();
    </script>
</body>
</html>
