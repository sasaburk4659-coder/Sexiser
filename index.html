<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sexiser - Главная</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            position: relative;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 50px 20px;
            color: white;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            animation: fadeInDown 0.8s ease;
        }

        p {
            font-size: 18px;
            opacity: 0.9;
            animation: fadeInUp 0.8s ease;
        }

        .content {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .nav-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            gap: 15px;
            z-index: 1000;
        }

        .nav-btn {
            background: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            transform: scale(1.1);
            background: #667eea;
            color: white;
        }

        .page-indicator {
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .page-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            border: none;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .page-dot.active {
            background: white;
            color: #667eea;
            transform: scale(1.2);
        }

        .objects-container {
            position: relative;
            min-height: 400px;
        }

        .page-object {
            position: absolute;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .page-object:hover {
            transform: scale(1.05);
        }

        @keyframes slideInLeft {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .transition-left {
            animation: slideInLeft 0.5s ease-out;
        }

        .transition-right {
            animation: slideInRight 0.5s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="pageTitle">✨ Sexiser ✨</h1>
            <p id="pageDescription">Добро пожаловать на наш сайт!</p>
        </header>
        
        <div class="content">
            <div class="objects-container" id="objectsContainer">
                <!-- Здесь будут динамические объекты -->
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn" onclick="changePage('prev')">◀</button>
        <div class="page-indicator" id="pageIndicator">
            <span id="currentPageNum">1</span> / <span id="totalPagesNum">1</span>
        </div>
        <button class="nav-btn" onclick="changePage('next')">▶</button>
    </div>

    <script>
        let currentPageIndex = 0;
        let totalPages = 1;
        let pagesData = [];
        let currentObjects = [];

        // Загрузка данных с сервера редактора
        function loadSiteData() {
            // Пытаемся подключиться к локальному серверу редактора
            fetch('http://localhost:5000/api/public/site_data')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        pagesData = data.pages;
                        totalPages = pagesData.length;
                        currentPageIndex = data.current_page;
                        updatePageDisplay();
                    }
                })
                .catch(error => {
                    console.log('Редактор не запущен, показываем статическую версию');
                });
        }

        function updatePageDisplay() {
            if (pagesData.length === 0) return;
            
            const page = pagesData[currentPageIndex];
            document.getElementById('pageTitle').textContent = page.name;
            document.getElementById('currentPageNum').textContent = currentPageIndex + 1;
            document.getElementById('totalPagesNum').textContent = totalPages;
            
            // Загружаем объекты для этой страницы
            loadPageObjects(page.id);
        }

        function loadPageObjects(pageId) {
            fetch(`http://localhost:5000/api/public/page_objects/${pageId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        renderObjects(data.objects);
                    }
                })
                .catch(error => {
                    console.log('Ошибка загрузки объектов');
                });
        }

        function renderObjects(objects) {
            const container = document.getElementById('objectsContainer');
            container.innerHTML = '';
            
            objects.forEach(obj => {
                if (obj.type === 'image') {
                    const div = document.createElement('div');
                    div.className = 'page-object';
                    div.style.left = obj.data.x + 'px';
                    div.style.top = obj.data.y + 'px';
                    div.innerHTML = `<img src="${obj.data.src}" style="width: ${obj.data.width}px; border-radius: ${obj.data.border_radius || 0}px;">`;
                    container.appendChild(div);
                } else if (obj.type === 'text') {
                    const div = document.createElement('div');
                    div.className = 'page-object';
                    div.style.left = obj.data.x + 'px';
                    div.style.top = obj.data.y + 'px';
                    div.innerHTML = `<div style="font-size: ${obj.data.font_size}px; color: ${obj.data.color}">${obj.data.text}</div>`;
                    container.appendChild(div);
                }
            });
        }

        function changePage(direction) {
            const container = document.getElementById('objectsContainer');
            const animationClass = direction === 'next' ? 'transition-left' : 'transition-right';
            
            container.classList.add(animationClass);
            
            setTimeout(() => {
                if (direction === 'next') {
                    currentPageIndex = (currentPageIndex + 1) % totalPages;
                } else {
                    currentPageIndex = (currentPageIndex - 1 + totalPages) % totalPages;
                }
                updatePageDisplay();
                
                setTimeout(() => {
                    container.classList.remove(animationClass);
                }, 100);
            }, 200);
        }

        // Загружаем данные при старте
        loadSiteData();
        
        // Обновляем каждые 5 секунд (для实时ных изменений)
        setInterval(loadSiteData, 5000);
    </script>
</body>
</html>
