<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Client</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        .connection-panel {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .status {
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            margin: 10px 0;
        }
        .connected {
            background: rgba(76, 175, 80, 0.3);
            border: 1px solid #4caf50;
        }
        .disconnected {
            background: rgba(244, 67, 54, 0.3);
            border: 1px solid #f44336;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 5px;
        }
        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.9);
        }
        button {
            background: #4caf50;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .message-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            height: 400px;
            display: flex;
            flex-direction: column;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .message {
            margin: 5px 0;
            padding: 8px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
        }
        .message.sent {
            background: rgba(76, 175, 80, 0.3);
            text-align: right;
        }
        .message.received {
            background: rgba(33, 150, 243, 0.3);
        }
        .timestamp {
            font-size: 0.8em;
            color: #ccc;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        .server-select {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 WebSocket Client</h1>
        
        <div class="connection-panel">
            <h3>Server Connection</h3>
            <div class="input-group">
                <input type="text" id="serverUrl" placeholder="ws://localhost:8080 or wss://your-server.com" value="ws://localhost:8080">
                <button onclick="connect()" id="connectBtn">Connect</button>
                <button onclick="disconnect()" id="disconnectBtn" disabled>Disconnect</button>
            </div>
            <div id="status" class="status disconnected">
                Status: Disconnected
            </div>
        </div>

        <div class="message-area">
            <h3>💬 Messages</h3>
            <div id="messages" class="messages"></div>
            <div class="input-group">
                <input type="text" id="messageInput" placeholder="Type your message..." disabled>
                <button onclick="sendMessage()" id="sendBtn" disabled>Send</button>
            </div>
        </div>

        <div class="connection-panel">
            <h3>📊 Connection Info</h3>
            <div id="connectionInfo">
                <p>Client ID: <span id="clientId">Not connected</span></p>
                <p>Server: <span id="serverInfo">Not connected</span></p>
                <p>Protocol: <span id="protocol">-</span></p>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;

        function addMessage(text, type = 'received') {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            messageDiv.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${text}`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function updateUI(connected) {
            const connectBtn = document.getElementById('connectBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');
            const messageInput = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const statusDiv = document.getElementById('status');
            
            if (connected) {
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
                messageInput.disabled = false;
                sendBtn.disabled = false;
                statusDiv.className = 'status connected';
                statusDiv.innerHTML = 'Status: ✅ Connected';
            } else {
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
                messageInput.disabled = true;
                sendBtn.disabled = true;
                statusDiv.className = 'status disconnected';
                statusDiv.innerHTML = 'Status: ❌ Disconnected';
                document.getElementById('clientId').textContent = 'Not connected';
            }
        }

        function connect() {
            const serverUrl = document.getElementById('serverUrl').value;
            
            if (!serverUrl) {
                addMessage('Please enter a server URL', 'sent');
                return;
            }
            
            try {
                ws = new WebSocket(serverUrl);
                
                ws.onopen = () => {
                    addMessage(`Connected to ${serverUrl}`, 'received');
                    updateUI(true);
                    reconnectAttempts = 0;
                    
                    // Send initial message
                    ws.send('Client connected to server');
                };
                
                ws.onmessage = (event) => {
                    addMessage(`Server: ${event.data}`, 'received');
                    
                    // Try to extract client ID from welcome message
                    const match = event.data.match(/client #(\d+)/);
                    if (match) {
                        document.getElementById('clientId').textContent = match[1];
                    }
                    document.getElementById('serverInfo').textContent = serverUrl;
                    document.getElementById('protocol').textContent = 'WebSocket';
                };
                
                ws.onerror = (error) => {
                    addMessage(`WebSocket Error: ${error.message || 'Connection error'}`, 'received');
                    console.error('WebSocket error:', error);
                };
                
                ws.onclose = () => {
                    addMessage('Disconnected from server', 'received');
                    updateUI(false);
                    
                    // Auto reconnect
                    if (reconnectAttempts < maxReconnectAttempts) {
                        reconnectAttempts++;
                        addMessage(`Attempting to reconnect (${reconnectAttempts}/${maxReconnectAttempts})...`, 'received');
                        setTimeout(connect, 3000);
                    } else {
                        addMessage('Max reconnection attempts reached. Please reconnect manually.', 'received');
                    }
                };
                
            } catch (error) {
                addMessage(`Failed to connect: ${error.message}`, 'received');
            }
        }
        
        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
                updateUI(false);
                addMessage('Manually disconnected', 'received');
            }
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) {
                addMessage('Please enter a message', 'sent');
                return;
            }
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(message);
                addMessage(`You: ${message}`, 'sent');
                input.value = '';
            } else {
                addMessage('Not connected to server', 'received');
            }
        }
        
        // Handle Enter key
        document.getElementById('messageInput').addEventListener('keypress', (event) => {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });
        
        addMessage('Client ready. Enter server URL and click Connect to start.', 'received');
    </script>
</body>
</html>
