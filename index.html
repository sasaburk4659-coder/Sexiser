<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App | Script Runner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .error-box {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            margin-top: 50px;
        }
        
        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .error-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .error-text {
            color: var(--tg-theme-hint-color, #666666);
            margin-bottom: 30px;
            line-height: 1.5;
        }
        
        .button {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .button-destructive {
            background: var(--tg-theme-destructive-bg-color, #e53935);
        }
        
        .app-container {
            display: none;
        }
        
        .app-container.active {
            display: block;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
        }
        
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid var(--tg-theme-hint-color, #cccccc);
            border-top-color: var(--tg-theme-button-color, #2481cc);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #app {
            width: 100%;
            min-height: 400px;
        }
        
        .info-text {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #666);
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="errorBox" class="error-box">
            <div class="error-icon" id="errorIcon">🔍</div>
            <div class="error-title" id="errorTitle">Проверка приложения...</div>
            <div class="error-text" id="errorText">Пожалуйста, подождите</div>
            <button class="button" id="closeBtn" onclick="closeApp()">Закрыть</button>
        </div>
        
        <div id="appContainer" class="app-container">
            <div id="app"></div>
            <div class="info-text" id="infoText"></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let currentKey = null;
        
        function getParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }
        
        function showError(icon, title, text, showDeleteButton = false) {
            document.getElementById('errorIcon').innerHTML = icon;
            document.getElementById('errorTitle').innerText = title;
            document.getElementById('errorText').innerText = text;
            document.getElementById('errorBox').style.display = 'block';
            document.getElementById('appContainer').classList.remove('active');
            
            const closeBtn = document.getElementById('closeBtn');
            closeBtn.textContent = showDeleteButton ? '🗑 Удалить приложение' : 'Закрыть';
            closeBtn.className = showDeleteButton ? 'button button-destructive' : 'button';
            closeBtn.onclick = showDeleteButton ? deleteApp : closeApp;
        }
        
        function closeApp() {
            if (tg) tg.close();
            else window.close();
        }
        
        function deleteApp() {
            if (currentKey) {
                // Отправляем запрос на удаление через API бота
                const deleteUrl = `https://api.telegram.org/bot8647046412:AAE1O4lSBwpB_eeOXSDTnHnAsFqh2Wczdq4/sendMessage`;
                const user_id = tg ? tg.initDataUnsafe.user.id : 0;
                
                fetch(deleteUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: user_id,
                        text: `/delete_app ${currentKey}`
                    })
                }).catch(e => console.log('Ошибка удаления:', e));
            }
            showError('🗑', 'Приложение удаляется', 'Страница будет закрыта...', false);
            setTimeout(() => closeApp(), 1500);
        }
        
        async function loadApp() {
            const key = getParam('app');
            currentKey = key;
            
            if (!key) {
                showError('❌', 'Ошибка', 'Отсутствует ключ приложения');
                return;
            }
            
            // Пытаемся получить код с API сервера
            const API_URL = `http://localhost:8080/get_app?key=${key}`;
            
            try {
                // Показываем загрузку
                document.getElementById('errorTitle').innerText = 'Загрузка приложения...';
                document.getElementById('errorText').innerText = 'Проверяем доступность';
                
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (data.status === 'active') {
                    // Приложение активно - запускаем
                    document.getElementById('errorBox').style.display = 'none';
                    document.getElementById('appContainer').classList.add('active');
                    
                    const container = document.getElementById('app');
                    container.innerHTML = '<div id="app-root"></div>';
                    
                    try {
                        // Создаем iframe для изоляции кода
                        const iframe = document.createElement('iframe');
                        iframe.style.width = '100%';
                        iframe.style.minHeight = '500px';
                        iframe.style.border = 'none';
                        iframe.style.background = 'transparent';
                        container.innerHTML = '';
                        container.appendChild(iframe);
                        
                        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                        iframeDoc.open();
                        iframeDoc.write(`
                            <!DOCTYPE html>
                            <html>
                            <head>
                                <meta charset="UTF-8">
                                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                                <style>
                                    body { 
                                        margin: 0; 
                                        padding: 20px; 
                                        font-family: system-ui; 
                                        background: var(--tg-theme-bg-color, #fff); 
                                        color: var(--tg-theme-text-color, #000);
                                    }
                                </style>
                            </head>
                            <body>
                                <div id="app-root"></div>
                                <script>
                                    window.TelegramWebApp = window.parent.Telegram.WebApp;
                                    try {
                                        ${data.code}
                                    } catch(e) {
                                        document.getElementById('app-root').innerHTML = '<div style="color: red; padding: 20px; text-align: center;">❌ Ошибка выполнения: ' + e.message + '</div>';
                                    }
                                <\/script>
                            </body>
                            </html>
                        `);
                        iframeDoc.close();
                        
                        document.getElementById('infoText').innerHTML = `📱 Приложение: ${data.name} | Доступно до истечения 24 часов`;
                        
                        if (tg) {
                            tg.ready();
                            tg.expand();
                        }
                    } catch(e) {
                        showError('❌', 'Ошибка выполнения', e.message);
                    }
                } 
                else if (data.status === 'deleted') {
                    showError('🗑️', 'Приложение удалено', 'Это приложение было удалено создателем. Ссылка больше не действительна.', true);
                } 
                else if (data.status === 'expired') {
                    showError('⏰', 'Срок истек', 'Срок действия этого приложения истек (24 часа). Создайте новое приложение в боте.', false);
                } 
                else {
                    showError('🔍', 'Не найдено', 'Приложение с таким ключом не существует или было удалено.', false);
                }
            } catch(e) {
                console.error('Ошибка загрузки:', e);
                // Если API не доступен, показываем демо-режим
                showError('⚠️', 'Режим тестирования', 'API сервер не доступен. Работаем в демо-режиме.', false);
                
                // Демо-режим
                document.getElementById('errorBox').style.display = 'none';
                document.getElementById('appContainer').classList.add('active');
                
                const container = document.getElementById('app');
                container.innerHTML = `
                    <div style="text-align: center; padding: 20px;">
                        <h1>🎮 Демо-режим</h1>
                        <p>API сервер не запущен. Для полноценной работы запустите бота с API сервером.</p>
                        <div style="margin-top: 30px;">
                            <div class="counter" style="font-size: 48px; margin: 20px;" id="demoCounter">0</div>
                            <button onclick="demoClick()" style="padding: 20px 40px; font-size: 18px; background: #2481cc; color: white; border: none; border-radius: 50px; cursor: pointer;">Кликни меня!</button>
                        </div>
                    </div>
                    <script>
                        let count = 0;
                        window.demoClick = function() {
                            count++;
                            document.getElementById('demoCounter').innerText = count;
                        }
                    <\/script>
                `;
                
                if (tg) {
                    tg.ready();
                    tg.expand();
                }
            }
        }
        
        // Запускаем приложение
        loadApp();
    </script>
</body>
</html>
