<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPYT - Защищённый чат</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 800px;
            height: 600px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .status {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .access-denied {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }
        
        .access-denied h2 {
            color: #764ba2;
            margin-bottom: 20px;
        }
        
        .access-denied p {
            color: #666;
            margin-bottom: 30px;
        }
        
        .access-denied button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }
        
        .access-denied button:hover {
            transform: scale(1.05);
        }
        
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 10px;
            max-width: 70%;
        }
        
        .message.user {
            background: #667eea;
            color: white;
            margin-left: auto;
        }
        
        .message.other {
            background: #f0f0f0;
            color: #333;
        }
        
        .message.system {
            background: #fff3cd;
            color: #856404;
            text-align: center;
            max-width: 100%;
            font-size: 12px;
        }
        
        .input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        .input-area input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
        }
        
        .input-area button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
        
        .logout-btn {
            background: #dc3545;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🕷️ SPYT Secure Chat</h1>
            <div class="status" id="status">Проверка доступа...</div>
        </div>
        
        <div id="accessDenied" class="access-denied">
            <h2>⛔ Доступ запрещён</h2>
            <p>У вас нет доступа к этому чату. Для получения доступа нужен специальный ключ.</p>
            <button onclick="checkAccess()">Проверить доступ</button>
        </div>
        
        <div id="chatArea" class="chat-area hidden">
            <div class="messages" id="messages">
                <div class="message system">🤖 Добро пожаловать в защищённый чат!</div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Отправить</button>
            </div>
            <div class="input-area">
                <button onclick="logout()" class="logout-btn" style="width: 100%;">🚪 Выйти из чата</button>
            </div>
        </div>
    </div>

    <script>
        // Ключ доступа (проверяется из URL)
        let currentKey = null;
        let hasAccess = false;
        
        function getKeyFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('key');
        }
        
        function checkAccess() {
            currentKey = getKeyFromURL();
            
            if (currentKey) {
                // Проверяем ключ в localStorage
                const validKeys = JSON.parse(localStorage.getItem('spyt_valid_keys') || '[]');
                
                if (validKeys.includes(currentKey)) {
                    hasAccess = true;
                    showChat();
                    loadMessages();
                } else {
                    showAccessDenied();
                }
            } else {
                showAccessDenied();
            }
        }
        
        function loadMessages() {
            const messages = JSON.parse(localStorage.getItem('spyt_messages') || '[]');
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';
            
            if (messages.length === 0) {
                messagesDiv.innerHTML = '<div class="message system">🤖 Добро пожаловать в защищённый чат!</div>';
            } else {
                messages.forEach(msg => {
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message ${msg.type}`;
                    messageDiv.innerHTML = `<strong>${msg.sender}:</strong><br>${msg.text}<br><small>${msg.time}</small>`;
                    messagesDiv.appendChild(messageDiv);
                });
            }
            
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !hasAccess) return;
            
            const now = new Date();
            const timeStr = now.toLocaleTimeString();
            
            const messages = JSON.parse(localStorage.getItem('spyt_messages') || '[]');
            messages.push({
                sender: 'Пользователь',
                text: text,
                type: 'user',
                time: timeStr
            });
            
            localStorage.setItem('spyt_messages', JSON.stringify(messages));
            loadMessages();
            input.value = '';
        }
        
        function showChat() {
            document.getElementById('accessDenied').classList.add('hidden');
            document.getElementById('chatArea').classList.remove('hidden');
            document.getElementById('status').textContent = '✅ Доступ разрешён';
        }
        
        function showAccessDenied() {
            document.getElementById('accessDenied').classList.remove('hidden');
            document.getElementById('chatArea').classList.add('hidden');
            document.getElementById('status').textContent = '⛔ Доступ запрещён';
        }
        
        function logout() {
            window.location.href = window.location.pathname;
        }
        
        // Проверяем доступ при загрузке
        checkAccess();
        
        // Обновляем сообщения каждые 2 секунды
        setInterval(() => {
            if (hasAccess) loadMessages();
        }, 2000);
    </script>
</body>
</html>
