<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            padding: 20px;
            min-height: 100vh;
        }
        .error-box {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            margin-top: 50px;
        }
        .error-icon { font-size: 64px; margin-bottom: 20px; }
        .error-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .error-text { color: var(--tg-theme-hint-color, #666); margin-bottom: 30px; line-height: 1.5; }
        .button {
            background: var(--tg-theme-button-color, #2481cc);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
        }
        .app-container { display: none; }
        .app-container.active { display: block; }
        .loading { text-align: center; padding: 50px; }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #ccc;
            border-top-color: #2481cc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #app { width: 100%; min-height: 400px; }
    </style>
</head>
<body>
    <div id="errorBox" class="error-box">
        <div class="error-icon" id="errorIcon">🔍</div>
        <div class="error-title" id="errorTitle">Проверка...</div>
        <div class="error-text" id="errorText">Загрузка</div>
        <button class="button" id="closeBtn" onclick="closeApp()">Закрыть</button>
    </div>
    <div id="appContainer" class="app-container">
        <div id="app"></div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let currentKey = null;
        
        // Данные приложений (в реальности бот передает через URL параметр)
        // Здесь хранятся активные ключи и коды
        const APPS_DB = {};
        
        function getParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }
        
        function showError(icon, title, text) {
            document.getElementById('errorIcon').innerHTML = icon;
            document.getElementById('errorTitle').innerText = title;
            document.getElementById('errorText').innerText = text;
            document.getElementById('errorBox').style.display = 'block';
            document.getElementById('appContainer').classList.remove('active');
        }
        
        function closeApp() {
            if (tg) tg.close();
            else window.close();
        }
        
        function runApp(code, name) {
            document.getElementById('errorBox').style.display = 'none';
            document.getElementById('appContainer').classList.add('active');
            
            const container = document.getElementById('app');
            container.innerHTML = '<div id="app-root"></div>';
            
            try {
                const iframe = document.createElement('iframe');
                iframe.style.width = '100%';
                iframe.style.minHeight = '500px';
                iframe.style.border = 'none';
                container.innerHTML = '';
                container.appendChild(iframe);
                
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                iframeDoc.open();
                iframeDoc.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <meta charset="UTF-8">
                        <meta name="viewport" content="width=device-width, initial-scale=1.0">
                        <style>
                            body { margin: 0; padding: 20px; font-family: system-ui; background: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); }
                        </style>
                    </head>
                    <body>
                        <div id="app-root"></div>
                        <script>
                            window.TelegramWebApp = window.parent.Telegram.WebApp;
                            try {
                                ${code}
                            } catch(e) {
                                document.getElementById('app-root').innerHTML = '<div style="color:red;padding:20px;">Ошибка: ' + e.message + '</div>';
                            }
                            if (window.TelegramWebApp) {
                                window.TelegramWebApp.ready();
                                window.TelegramWebApp.expand();
                            }
                        <\/script>
                    </body>
                    </html>
                `);
                iframeDoc.close();
            } catch(e) {
                showError('❌', 'Ошибка', e.message);
            }
        }
        
        async function loadApp() {
            const key = getParam('app');
            currentKey = key;
            
            if (!key) {
                showError('❌', 'Ошибка', 'Отсутствует ключ приложения');
                return;
            }
            
            // Получаем данные через API бота (JSONP)
            const script = document.createElement('script');
            script.src = `https://api.telegram.org/bot8647046412:AAE1O4lSBwpB_eeOXSDTnHnAsFqh2Wczdq4/getApp?key=${key}&callback=handleAppData`;
            
            window.handleAppData = function(data) {
                if (data.status === 'active') {
                    runApp(data.code, data.name);
                } else if (data.status === 'deleted') {
                    showError('🗑️', 'Приложение удалено', 'Это приложение было удалено создателем');
                } else if (data.status === 'expired') {
                    showError('⏰', 'Срок истек', 'Приложение доступно только 24 часа');
                } else {
                    showError('🔍', 'Не найдено', 'Приложение не существует');
                }
            };
            
            document.body.appendChild(script);
            setTimeout(() => {
                if (document.getElementById('errorBox').style.display !== 'none') {
                    showError('⚠️', 'Ошибка', 'Не удалось загрузить приложение');
                }
            }, 5000);
        }
        
        loadApp();
    </script>
</body>
</html>
