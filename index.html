<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Granny 3D — Побег из дома</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: monospace; touch-action: none; }
    canvas { display: block; }

    #ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }

    .panel {
      position: absolute;
      top: 14px;
      left: 14px;
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 18px;
      padding: 10px 14px;
      color: #ffd9a6;
      display: flex;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(8px);
      font-size: 14px;
    }

    .panel.second { top: 66px; }
    #health-bar {
      width: 160px;
      height: 12px;
      background: #2c0000;
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 0 5px #000;
    }
    #health-fill {
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #e74c3c, #ff6b5f);
    }

    #message {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 20px;
      border-radius: 18px;
      border: 2px solid #e74c3c;
      background: rgba(0,0,0,0.88);
      color: #ff6b6b;
      font-size: 18px;
      display: none;
      white-space: nowrap;
      text-align: center;
    }

    .joystick-base {
      position: absolute;
      left: 24px;
      bottom: 24px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(20,20,30,0.55);
      border: 2px solid rgba(255,255,255,0.22);
      z-index: 25;
      pointer-events: auto;
      touch-action: none;
      backdrop-filter: blur(10px);
    }

    .joystick-thumb {
      position: absolute;
      left: 38px;
      top: 38px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 0 10px rgba(0,0,0,0.25);
      transition: transform 0.02s linear;
      touch-action: none;
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      color: #bbb;
      font-size: 11px;
      background: rgba(0,0,0,0.55);
      padding: 5px 12px;
      border-radius: 999px;
      z-index: 25;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      .panel { font-size: 12px; }
      .joystick-base { width: 96px; height: 96px; }
      .joystick-thumb { width: 36px; height: 36px; left: 30px; top: 30px; }
      #health-bar { width: 120px; }
    }

    .hurt { animation: hurtFlash 0.18s ease-out; }
    @keyframes hurtFlash {
      0% { background-color: rgba(255,0,0,0); }
      40% { background-color: rgba(255,0,0,0.45); }
      100% { background-color: rgba(255,0,0,0); }
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="panel">
      <span>❤</span>
      <div id="health-bar"><div id="health-fill"></div></div>
    </div>
    <div class="panel second">
      <span>🔑</span>
      <div id="inventory">— нет ключа —</div>
    </div>
    <div id="message"></div>
    <div class="joystick-base" id="joystickBase"><div class="joystick-thumb" id="joystickThumb"></div></div>
    <div class="hint">Левый джойстик — движение, правую часть экрана свайпом — поворот</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x090912);
    scene.fog = new THREE.FogExp2(0x090912, 0.035);

    const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.05, 100);
    camera.position.set(0, 1.7, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0x404060, 0.9);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffe7c2, 1.1);
    dirLight.position.set(4, 8, 5);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const fill = new THREE.PointLight(0x8a6bff, 0.45, 18);
    fill.position.set(0, 2, 0);
    scene.add(fill);

    const roomMat = new THREE.MeshStandardMaterial({ color: 0xb98f61, roughness: 0.95 });
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 1 });

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(16, 16), floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.1;
    floor.receiveShadow = true;
    scene.add(floor);

    const backWall = new THREE.Mesh(new THREE.BoxGeometry(16, 3.5, 0.3), roomMat);
    backWall.position.set(0, 1.7, -7);
    scene.add(backWall);

    const leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3.5, 16), roomMat);
    leftWall.position.set(-7, 1.7, 0);
    scene.add(leftWall);

    const rightWall = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3.5, 16), roomMat);
    rightWall.position.set(7, 1.7, 0);
    scene.add(rightWall);

    const chairMat = new THREE.MeshStandardMaterial({ color: 0xaa8866, roughness: 0.9 });
    const chair = new THREE.Group();
    chair.add(new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 0.8), chairMat));
    const chairBack = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.1), chairMat);
    chairBack.position.set(0, 0.6, -0.4);
    chair.add(chairBack);
    chair.position.set(-3, 0, -3);
    scene.add(chair);

    const oven = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 1.5, 0.8),
      new THREE.MeshStandardMaterial({ color: 0xcc8866, roughness: 0.8 })
    );
    oven.position.set(4.5, 0.7, -2);
    scene.add(oven);

    const table = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 0.2, 1.2),
      new THREE.MeshStandardMaterial({ color: 0xaa8866, roughness: 0.9 })
    );
    table.position.set(-4, 0.1, 2);
    scene.add(table);

    const door = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 2.2, 0.2),
      new THREE.MeshStandardMaterial({ color: 0x9b7653, roughness: 0.9 })
    );
    door.position.set(6.5, 1.1, -1);
    scene.add(door);

    const keyMesh = new THREE.Mesh(
      new THREE.BoxGeometry(0.24, 0.24, 0.24),
      new THREE.MeshStandardMaterial({ color: 0xffc533, emissive: 0x332200, metalness: 0.9, roughness: 0.2 })
    );
    keyMesh.position.set(-3.8, 0.25, 2.2);
    scene.add(keyMesh);

    const medGroup = new THREE.Group();
    const medBox = new THREE.Mesh(
      new THREE.BoxGeometry(0.3, 0.3, 0.3),
      new THREE.MeshStandardMaterial({ color: 0xdd5555, roughness: 0.7 })
    );
    const medH = new THREE.Mesh(
      new THREE.BoxGeometry(0.32, 0.06, 0.06),
      new THREE.MeshStandardMaterial({ color: 0xffffff })
    );
    const medV = new THREE.Mesh(
      new THREE.BoxGeometry(0.06, 0.32, 0.06),
      new THREE.MeshStandardMaterial({ color: 0xffffff })
    );
    medGroup.add(medBox, medH, medV);
    medGroup.position.set(5, 0.2, -1.5);
    scene.add(medGroup);

    const granny = new THREE.Group();
    const grannyBody = new THREE.Mesh(
      new THREE.BoxGeometry(0.6, 1.2, 0.5),
      new THREE.MeshStandardMaterial({ color: 0x664455, roughness: 1 })
    );
    grannyBody.position.y = 0.6;
    const grannyHead = new THREE.Mesh(
      new THREE.SphereGeometry(0.4, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0xddaa88, roughness: 1 })
    );
    grannyHead.position.y = 1.25;
    const broom = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.1, 0.8, 8),
      new THREE.MeshStandardMaterial({ color: 0xaa8866, roughness: 1 })
    );
    broom.position.set(0.4, 0.3, 0.2);
    broom.rotation.z = 0.5;
    granny.add(grannyBody, grannyHead, broom);
    granny.position.set(-2, 0, -3);
    scene.add(granny);

    const uiHealth = document.getElementById('health-fill');
    const uiInventory = document.getElementById('inventory');
    const uiMessage = document.getElementById('message');
    const body = document.body;

    const player = {
      pos: new THREE.Vector3(0, 0, 2.5),
      yaw: 0,
      pitch: 0,
      health: 100,
      hasKey: false,
      dead: false,
      won: false
    };

    const collectables = [
      { mesh: keyMesh, type: 'key', taken: false },
      { mesh: medGroup, type: 'medkit', taken: false }
    ];

    function showMessage(text, ms = 1800) {
      uiMessage.textContent = text;
      uiMessage.style.display = 'block';
      clearTimeout(showMessage.timer);
      showMessage.timer = setTimeout(() => uiMessage.style.display = 'none', ms);
    }

    function updateUI() {
      uiHealth.style.width = Math.max(0, player.health) + '%';
      uiInventory.textContent = player.hasKey ? 'Ключ найден' : '— нет ключа —';
    }

    const moveInput = { x: 0, y: 0 };
    const look = { active: false, id: null, lastX: 0, lastY: 0 };
    const joy = { active: false, id: null, cx: 0, cy: 0 };

    const joyBase = document.getElementById('joystickBase');
    const joyThumb = document.getElementById('joystickThumb');

    function setThumb(dx, dy) {
      joyThumb.style.transform = `translate(${dx}px, ${dy}px)`;
    }

    joyBase.addEventListener('pointerdown', e => {
      joy.active = true;
      joy.id = e.pointerId;
      joyBase.setPointerCapture(e.pointerId);
      const r = joyBase.getBoundingClientRect();
      joy.cx = r.left + r.width / 2;
      joy.cy = r.top + r.height / 2;
      updateJoy(e);
      e.preventDefault();
    });

    window.addEventListener('pointermove', e => {
      if (joy.active && e.pointerId === joy.id) updateJoy(e);
      if (look.active && e.pointerId === look.id) {
        const dx = e.clientX - look.lastX;
        const dy = e.clientY - look.lastY;
        player.yaw -= dx * 0.008;
        player.pitch -= dy * 0.008;
        player.pitch = Math.max(-0.8, Math.min(0.8, player.pitch));
        look.lastX = e.clientX;
        look.lastY = e.clientY;
      }
    });

    window.addEventListener('pointerup', e => {
      if (joy.active && e.pointerId === joy.id) {
        joy.active = false;
        joy.id = null;
        moveInput.x = 0;
        moveInput.y = 0;
        setThumb(0, 0);
      }
      if (look.active && e.pointerId === look.id) {
        look.active = false;
        look.id = null;
      }
    });

    window.addEventListener('pointerdown', e => {
      if (e.target === joyBase) return;
      if (!look.active) {
        look.active = true;
        look.id = e.pointerId;
        look.lastX = e.clientX;
        look.lastY = e.clientY;
      }
    });

    function updateJoy(e) {
      const max = 36;
      let dx = e.clientX - joy.cx;
      let dy = e.clientY - joy.cy;
      const dist = Math.hypot(dx, dy);
      if (dist > max) {
        dx = dx / dist * max;
        dy = dy / dist * max;
      }
      moveInput.x = dx / max;
      moveInput.y = dy / max;
      setThumb(dx, dy);
    }

    function canMoveTo(x, z) {
      return Math.abs(x) <= 6.35 && Math.abs(z) <= 5.7;
    }

    function collectItems() {
      for (const item of collectables) {
        if (item.taken) continue;
        const d = Math.hypot(player.pos.x - item.mesh.position.x, player.pos.z - item.mesh.position.z);
        if (d < 0.8) {
          item.taken = true;
          scene.remove(item.mesh);
          if (item.type === 'key') {
            player.hasKey = true;
            showMessage('Ключ найден!');
          } else if (item.type === 'medkit') {
            player.health = Math.min(100, player.health + 30);
            showMessage('Здоровье +30');
          }
          updateUI();
        }
      }
    }

    function updateGranny(dt) {
      const dx = player.pos.x - granny.position.x;
      const dz = player.pos.z - granny.position.z;
      const dist = Math.hypot(dx, dz);

      if (dist < 4.8) {
        const dirX = dx / Math.max(0.001, dist);
        const dirZ = dz / Math.max(0.001, dist);
        granny.position.x += dirX * dt * 0.8;
        granny.position.z += dirZ * dt * 0.8;
      } else {
        granny.position.x += Math.sin(performance.now() * 0.0012) * dt * 0.35;
      }

      granny.position.x = THREE.MathUtils.clamp(granny.position.x, -5.5, 5.5);
      granny.position.z = THREE.MathUtils.clamp(granny.position.z, -5.0, 5.0);

      const touchDist = Math.hypot(player.pos.x - granny.position.x, player.pos.z - granny.position.z);
      if (touchDist < 1.1 && !player.dead && !player.won) {
        player.health -= 15;
        body.classList.add('hurt');
        setTimeout(() => body.classList.remove('hurt'), 180);
        showMessage('Granny ударила тебя!');
        updateUI();
        if (player.health <= 0) {
          player.dead = true;
          showMessage('Ты проиграл...', 2500);
        }
      }
    }

    function tryWin() {
      const d = Math.hypot(player.pos.x - door.position.x, player.pos.z - door.position.z);
      if (d < 1.2) {
        if (player.hasKey) {
          player.won = true;
          showMessage('Победа! Ты сбежал!', 3000);
        } else {
          showMessage('Нужен ключ!');
        }
      }
    }

    let last = performance.now();

    function animate(now) {
      requestAnimationFrame(animate);
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;

      if (!player.dead && !player.won) {
        const speed = 2.6;
        const forward = new THREE.Vector3(Math.sin(player.yaw), 0, Math.cos(player.yaw));
        const right = new THREE.Vector3(forward.z, 0, -forward.x);
        const wish = new THREE.Vector3();
        wish.addScaledVector(right, moveInput.x);
        wish.addScaledVector(forward, -moveInput.y);
        if (wish.lengthSq() > 0) wish.normalize();

        const nextX = player.pos.x + wish.x * speed * dt;
        const nextZ = player.pos.z + wish.z * speed * dt;

        if (canMoveTo(nextX, player.pos.z)) player.pos.x = nextX;
        if (canMoveTo(player.pos.x, nextZ)) player.pos.z = nextZ;

        collectItems();
        updateGranny(dt);
        tryWin();
      }

      camera.position.set(player.pos.x, 1.7, player.pos.z);

      const target = new THREE.Vector3(
        player.pos.x + Math.sin(player.yaw) * 1.5,
        1.7 + player.pitch,
        player.pos.z + Math.cos(player.yaw) * 1.5
      );
      camera.lookAt(target);

      const swing = Math.sin(now * 0.01) * 0.02;
      keyMesh.rotation.y += 0.03;
      medGroup.rotation.y += 0.02;
      granny.rotation.y = Math.atan2(player.pos.x - granny.position.x, player.pos.z - granny.position.z);
      if (Math.hypot(moveInput.x, moveInput.y) > 0.05 && !player.dead && !player.won) {
        camera.position.y = 1.7 + Math.sin(now * 0.015) * 0.01 + Math.abs(swing);
      }

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    updateUI();
    showMessage('Найди ключ и открой дверь');
    requestAnimationFrame(animate);
  </script>
</body>
</html>
