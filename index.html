<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат с Python управлением</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .chat-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .api-info {
            background: #f8f9fa;
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .api-key-box {
            background: #2d3748;
            color: #68d391;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
            margin-top: 10px;
        }
        
        .api-url-box {
            background: #2d3748;
            color: #63b3ed;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            margin-top: 10px;
        }
        
        .copy-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 10px;
        }
        
        .messages-area {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f7fafc;
        }
        
        .message {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease-out;
            padding: 10px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        .sender {
            font-weight: bold;
            color: #667eea;
            margin-right: 10px;
        }
        
        .timestamp {
            font-size: 11px;
            color: #999;
        }
        
        .message-text {
            margin-top: 5px;
            word-wrap: break-word;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }
        
        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .status {
            padding: 10px;
            text-align: center;
            font-size: 12px;
            background: #edf2f7;
            color: #4a5568;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="chat-card">
            <div class="header">
                <h1>💬 Чат с Python управлением</h1>
                <p>Отправляйте сообщения через Python скрипт</p>
            </div>
            
            <div class="api-info">
                <strong>🔑 API Ключ:</strong>
                <div class="api-key-box" id="apiKey">Загрузка...</div>
                
                <strong>🔗 API Ссылка:</strong>
                <div class="api-url-box" id="apiUrl">Загрузка...</div>
                <button class="copy-btn" onclick="copyApiUrl()">📋 Копировать ссылку</button>
            </div>
            
            <div class="messages-area" id="messages">
                <div class="message">
                    <span class="sender">📡 Система:</span>
                    <span class="timestamp"></span>
                    <div class="message-text">Чат активен. Ожидание сообщений...</div>
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Напишите сообщение..." />
                <button onclick="sendMessage()">Отправить</button>
            </div>
            
            <div class="status" id="status">
                🟢 Онлайн | Ожидание сообщений
            </div>
        </div>
    </div>

    <script>
        // ==============================================
        // 🔑 СЕКРЕТНЫЙ КЛЮЧ (ДОЛЖЕН СОВПАДАТЬ С PYTHON СКРИПТОМ)
        // ==============================================
        const SECRET_KEY = "1%&2/&)1)(2$+12+11$+1/131";
        
        // Хранилище сообщений
        let messages = JSON.parse(localStorage.getItem('chat_messages') || '[]');
        
        // Отображение ключа
        document.getElementById('apiKey').textContent = SECRET_KEY;
        document.getElementById('apiUrl').textContent = window.location.href;
        
        // Функция для добавления сообщения
        function addMessage(text, sender) {
            const message = {
                id: Date.now(),
                text: text,
                sender: sender,
                timestamp: new Date().toLocaleTimeString(),
                date: new Date().toISOString()
            };
            
            messages.push(message);
            
            // Храним последние 100 сообщений
            if (messages.length > 100) {
                messages = messages.slice(-100);
            }
            
            localStorage.setItem('chat_messages', JSON.stringify(messages));
            displayMessages();
            return message;
        }
        
        // Отображение сообщений
        function displayMessages() {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';
            
            if (messages.length === 0) {
                messagesDiv.innerHTML = '<div class="message"><span class="sender">📡 Система:</span><div class="message-text">Нет сообщений. Отправьте первое сообщение через Python!</div></div>';
                return;
            }
            
            messages.forEach(msg => {
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message';
                msgDiv.innerHTML = `
                    <span class="sender">${escapeHtml(msg.sender)}:</span>
                    <span class="timestamp">${msg.timestamp}</span>
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                `;
                messagesDiv.appendChild(msgDiv);
            });
            
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // Отправка сообщения с сайта
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage(text, 'Сайт');
            input.value = '';
            
            const status = document.getElementById('status');
            status.innerHTML = '✅ Сообщение отправлено с сайта';
            setTimeout(() => {
                status.innerHTML = '🟢 Онлайн | Ожидание сообщений';
            }, 2000);
        }
        
        // Получение сообщений от Python (через хэш URL)
        function checkForPythonMessage() {
            // Проверяем hash параметры
            const hash = window.location.hash.substring(1);
            if (hash) {
                try {
                    const params = new URLSearchParams(hash);
                    const key = params.get('key');
                    const text = params.get('text');
                    const sender = params.get('sender') || 'Python Script';
                    
                    if (key === SECRET_KEY && text) {
                        addMessage(decodeURIComponent(text), decodeURIComponent(sender));
                        
                        const status = document.getElementById('status');
                        status.innerHTML = `✅ Получено сообщение от Python: ${decodeURIComponent(text).substring(0, 50)}`;
                        status.style.background = '#c6f6d5';
                        setTimeout(() => {
                            status.innerHTML = '🟢 Онлайн | Ожидание сообщений';
                            status.style.background = '#edf2f7';
                        }, 3000);
                        
                        // Очищаем hash
                        window.location.hash = '';
                        return true;
                    }
                } catch(e) {
                    console.error('Ошибка:', e);
                }
            }
            return false;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function copyApiUrl() {
            navigator.clipboard.writeText(window.location.href);
            alert('✅ Ссылка скопирована!');
        }
        
        // Периодическая проверка новых сообщений (для синхронизации между вкладками)
        setInterval(() => {
            const saved = localStorage.getItem('chat_messages');
            if (saved) {
                const newMessages = JSON.parse(saved);
                if (JSON.stringify(messages) !== JSON.stringify(newMessages)) {
                    messages = newMessages;
                    displayMessages();
                }
            }
        }, 1000);
        
        // Проверка сообщения от Python при загрузке
        checkForPythonMessage();
        displayMessages();
        
        console.log('✅ Чат готов!');
        console.log('🔑 Ключ:', SECRET_KEY);
    </script>
</body>
</html>
